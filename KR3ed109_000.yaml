body:
  text: 噎隔門神仙奪命丹專治噎食烏梅十三個水浸去核杵爛硇砂雄黃各二錢百草霜五錢緑豆黑豆各四十九粒共為末和梅再搗為丸如彈子大以乳香一錢少加硃砂為衣陰乾空心噙化一丸待藥化盡即以熱餅一個茶泡食之無礙已驗過三五日再服一丸即愈治噎單方細糠用碓嘴上者蜜丸如彈子大每服一丸噙化津咽下又方藍靛汁治噎如神又方白麵二斤半蒸一大饅頭頂上開口挖空將皂礬裝滿用新瓦四圍遮護鹽泥封固挖土窯置之文武火燒一晝夜候紅取出研細棗肉丸如桐子大空心服二十丸忌酒色餘論噎氣膈氣皆氣也膈氣失治則痰結而為翻胃至危也古人謂風勞臌膈實病難醫者所以警世也今人膈有痰火識者謂其至危而彼全然不以為意及至翻胃既成乃云恐成隔症是誤以膈為隔也不知翻胃為極危篤之症若翻胃後已膈死矣又何言哉故詳論於翻胃篇中臨症用藥俱當合看又方治五噎心膈氣滯用香附子炒去毛為末酒煎陳皮湯調一二錢服每日三服亦治心痛附治噎方白朮槿花一兩用水二碗煎一碗空心午間晚上三時服又方將隔年廣陳皮刮去垢以生薑三片搗汁片伴之於飯上蒸熟曬乾磨為細末滴水為丸每服三錢白滾湯下已驗用大柳樹上生楮樹或桑樹連根取下切碎煎湯服三五日其病自除治飲食不住口仍易飢餓用緑豆黃麥糯米各一升炒熟共磨成粉每服一酒杯以滾湯調服三五日效治受山嵐瘴氣用生熟大蒜各七片共細嚼食之少頃腹中鳴或口吐血或大便泄氣即愈治心氣及胃脘諸痛肥梔子十枚去殼薑汁浸炒連殼用川芎一錢香附童便制一錢三味用水煎三滾滴三茶匙薑汁入內再煎一滾百草霜細研二茶匙調和服之立效又方用生明礬末一錢川椒末二分白滾湯調服忌腥物麵食蕎麥又方用生礬二錢石榴皮二錢用酒一碗煎服效又方治心氣痛不可忍及小腸氣痛蒲黃炒五靈脂酒炒淘去沙各等分先以醋調二錢煎成膏入水一盞煎食前服又方烏梅一個去核杏仁七粒去尖紅棗二個去核共搗作一服男用好酒女用好醋不拘時服又方雄黃二錢為末烏梅肉二錢合勻研爛為丸每服五十丸薑湯米飲送下又盞落湯治急心疼陳皮香附子良薑吳茱萸石菖蒲各等分切咀片用水一碗煎至七分先將碗用香油三五滴在內水盞蓋之將藥淋下熱服治冷心氣疼乳香三分火煉去油明礬一錢煉過為末好酒送下治熱心氣疼取鍋底黑末以童子熱小便調服三錢即愈治膈噎方枇杷葉拭去毛炙陳皮炮去白焙一兩生薑五錢又方以水二碗一碗分溫二次服用藍靛食之翻胃門翻胃之症有四說氣虛血虛痰與熱此患多應脾胃虛火動痰升谷不納右脈無力屬氣虛左脈無力血虛別寸關之脈沉而澀下手應知必氣結寸關浮大或沉沉蓋有升痰為嘔噦四君子入二陳中參朮茯苓半夏逢甘草梔連歸枳實木香神麯火姜同煎加竹瀝並薑汁一服須交有奏功老者逢之氣血虛少年得此宜躊蹰胃口血燥便赤澀辨論須詳格致余口中沫出終不止糞如羊屎命應殂急救翻胃單方馬剝兒燒灰存性二錢好棗肉平胃散各二錢和勻溫酒調服食即可下然後隨病源調理又方以千葉白槿花陰乾為末陳米湯調下三五口不轉再服如無花即葉亦可又方黃丹細研小棗去皮核研丸如雞頭大每用一丸針簽於燈上燒灰為末乳汁下又方覓翻翅雞一隻煮熟去骨入人參當歸食鹽俱為細末各五錢再煮與食之勿令人共食又方虎脂半斤切如豆大清油一斤瓦瓶浸虎脂一月厚綿紙封口勿令泄氣每用清油一兩入無灰好酒一大鐘調勻溫服服盡病自減其虎脂尚可浸二次再可活二人又方韭汁二兩牛乳一盞薑汁五錢和勻溫服又方治翻胃並積飲生薑自然汁澄白腳丸益元散如菜子大時時服之又方治翻胃噎膈螃蟹涎為末每服五分燒酒下取涎法以蟹洗淨置瓶內水高四指入油一小杯捻白麵撒水上即出次日去蟹曬乾又方治翻胃以丁香十五粒刺入雪梨內濕紙包煨食之又方治乾嘔不止用甘蔗漿七升薑汁一升和勻分五次服順氣和中湯治嘔吐翻胃嘈雜吞酸痞悶噫氣噎膈刺痛噁心吐痰等證陳皮鹽水浸炒香附醋浸炒梔子薑汁炒黑各一錢白朮去蘆土炒八分白茯苓去皮枳實麩炒各七分半夏薑汁浸炒黃連薑汁炒曬乾再以豬膽汁拌炒神麯炒各六分砂仁炒三分甘草炙二分用長流水入膠泥攪和再澄清取水一鍾姜三片煎七分入竹瀝童便薑汁不拘時細細溫服胃口痛加薑汁氣虛加參耆各八分血虛加歸七分芎五分氣惱或氣不暢加烏藥五分木香三分胸膈飽悶加蘿蔔子炒六分嘈雜醋心加吳茱萸四分倍黃連白朮嘔吐不止加藿香根七分安中調氣丸治翻胃及一切痰膈香附三兩長流水浸三日洗淨炒黃色白朮去蘆土炒陳皮鹽水浸炒各二兩半夏白礬薑汁煮過曬乾枳實炒白茯苓水洗去皮木神麯炒各一兩白芍鹽酒炒八錢蘿蔔子炒六錢白豆蔻去殼當歸酒洗川芎紫蘇黃連薑汁炒各五錢甘草三錢木香一錢十六味共為細末薑汁竹瀝打神麯糊為丸如黃豆大清米湯下八十丸養血助胃丸嘔吐翻胃愈後用此養元氣健脾胃生血脈調營衛清鬱氣收功保後白朮去蘆酒炒一兩三錢白芍鹽水炒一兩二錢當歸酒浸熟地薑汁浸炒川芎蓮肉去皮心山藥炒各一兩白茯苓去皮扁豆薑汁炒各六錢人參五錢甘草炙三錢姜汁打神麯糊為丸如桐子大空心滾湯下六七十丸餘論翻胃膈噎名雖殊而理則一噎者飲食時火氣炎上猝然阻滯也膈者氣鬱痰搏初則咽喉時覺有礙吐之不出咽之不下久則妨食也翻胃者痰火結於胃之上脘食已即吐結於下腕朝食暮吐也皆陽火不降而上行也由於憂思悲恐怒寒熱勞食扇動陽氣積成膈熱初津液不行不思飲食或噫腐作酸嘈雜痞悶誤認為寒服辛香燥熱之劑時暫得快七情反覆舊病益深不遇良工又行燥藥痰挾淤血遂結窠囊是速翻胃之成也善治者不治已病治未病平時於脾胃門參究有感於諸氣門詳觀見證於吞酸時用藥焉得至此戴氏云痰盛脈滑以二陳為主熱甚脈數解毒為主血虛脈數而無力以四物為主氣虛脈緩而無力以四君子為主氣血俱虛脈沉而澀口中出沫不治蓋氣血未虛用藥劫痰火病不復生氣血虛者劫去痰火雖亦暫息病必復作所以然者氣虛則不能運化而生痰血虛則不能滋潤而生火故也龔氏主於清痰降火以二陳加薑汁韭汁竹瀝童便及牛乳為主熱悶加炒芩連瓜蔞桔梗氣噎加香附癎芎木香檳榔砂仁氣虛肥白合君子用竹瀝薑汁血虛痰弱合四物湯加紅花杏仁研泥用童便韭汁大便燥結用酒蒸大黃以潤之脾不磨者加神麯麥芽以助之若將成翻胃多服牛乳為上策但不可用人乳內恐有飲食烹飪色欲勞倦之火也張機峰云噎是神思過度惟內觀以自養乃能安耳至哉斯言也切不可再服香燥戒之戒之治翻胃取肥皂子五個或七個月白麵水調包裹火上煨熟去皂子用面研細末或酒或湯調下即吐稠痰愈以淮麥面妙又方半夏五錢茯苓五錢水二碗煎一碗去滓入生薑汁再煎三沸不拘時熱服治翻胃方用甘蔗汁七升生薑汁一升相和如糊分作三服又方用蓽澄茄為末米和丸薑湯下仍服平胃散三十帖又方以年深蜆爛殼為白灰米飲調下一錢蚌殼亦可氣症門悍怒不息之謂氣觸動七情何所治古人作用七氣湯厚朴陳皮為上劑木香半夏大腹皮蘇子茯苓甘草配枳殼桔梗加生薑金䤭同煎取下氣走氣痛者又一方五兩草烏三兩姜靈脂羌活芎歸芷醋煮自然銅乳香各稱二兩丸滴水外面為衣百草霜每服百粒桐子大送下全憑酒與湯古四七湯治喜怒悲思憂恐驚七氣結成痰涎狀如破絮或如梅核在喉中咯不出噎不下或脘中痞滿或痰涎壅盛上氣喘結或痰飲中阻嘔逆噁心半夏五兩茯苓四兩厚朴三兩紫蘇二兩薑棗煎服梅核氣加桔梗枳實一方加檳榔思慮過度小便白濁此方下青州白丸子最妙婦人惡阻亦宜服之半夏用薑汁製加參桂芍名七氣湯分心氣飲治抑鬱之氣留滯不散胸膈痞滿悶脅肋虛脹噫氣吞酸噁心頭眩口苦舌乾飲食減少大腸虛閉等證紫蘇二兩青皮陳皮大腹皮桑白皮羌活各五錢半夏木通各三錢半赤芍三錢官桂甘草各二錢半分五劑薑棗燈心煎服性急加柴胡多怒加黃芩食少加砂仁神麯咳嗽加桔梗半夏痞甚加枳實香附三焦不和加烏藥氣閉加萊蔔子枳殼上焦熱盛加黃芩下焦熱盛加梔子翻胃加沉香磨服水氣面浮加豬苓澤瀉車前木瓜葶藶麥冬氣成塊加三稜莪朮餘論軒岐論諸痛皆因於氣遂有九氣之說其言曰喜則氣緩怒則氣上悲則氣消思則氣結恐則氣下寒則氣收暑則氣泄驚則氣亂勞則氣耗劉宗厚曰護其表行其里生生者氣也五志極而火起焉後世概用香辛燥熱之劑非也且經言高者抑之下者舉之寒者熱之熱者寒之驚者平之勞者溫之結者散之喜以恐勝之悲以喜勝之九氣治各不同如枳殼利肺氣多服損胸中至高之氣青皮瀉肝氣多服損真氣與夫木香行中下焦氣香附快滯氣陳皮泄逆氣紫蘇散表氣厚朴瀉衛氣檳榔瀉至高之氣藿香行胃氣沉香升降真氣腦麝散真氣各有所宜醫者不可不辨上歌訣酌其中而定臨時尚當審病勢隨經所用之加減正氣散見臌脹青州白丸子見中風傷風門肺受風寒鼻作壅咳嗽頭痛聲氣重夾氣發熱汗有無甚者渾身骨節痛加味香蘇飲可劫蒼半夏茯桔梗皮藿香厚朴並蘇葉香附薑蔥水合宜但看感冒如虛者後用參蘇飲與之參蘇飲內用參蘇半夏陳皮枳殼多乾葛木香同桔梗茯苓甘草共前胡渾身骨痛加羌活頭痛川芎白芷扶參蘇飲詳咳嗽香蘇散見傷寒餘論傷風為病似輕人多有犯之者精神壯健亦能自愈然病根終藏身內不如早散之為是傷寒門霜降節後春分前冒寒即病曰傷寒春變溫兮夏變暑六經之證須分看頭項痛兮腰脊強浮居尺寸太陽干脈長陽明胃受病鼻乾目痛不能眠少陽脈弦而脅痛嘔龔口苦熱而安太陰腹滿仍自利尺寸沉兮津少咽少陰尺寸俱沉細須知口燥舌尤干厥陰之脈多微緩更兼煩滿及囊蜷三陽宜汗三陰下用藥還須以症參太陽無汗是傷寒麻黃髮表用之堪桂防芎芷甘升杏羌活麻黃作伴煎豆豉薑蔥和水煮熱服取汗自然安太陽有汗曰傷風疏邪實表桂防芎羌紫芍術生薑草服則加飴煎則蔥二湯冬用他時忌羌活沖和代最功羌活沖和治類寒防蒼多用次芩甘細辛芎芷並生地溫暑俱宜此藥安有汗去蒼加白朮渴加知母石膏添春深可代麻黃用更入生薑大棗煎陽明鼻乾燥頭疼及眼眶惡寒兼不寐身熱用何方柴葛解肌好黃芩白芷羌桔梗甘草芍煎用石膏嘗有汗而渴者如神白虎湯身熱而渴自汗出陽明症候微洪脈如神白虎石膏先參連知味陳粳粒麥冬梔草共天花服時搗和烏梅汁柴胡雙解飲專治少陽經夏草芩參葛陳皮芍茯苓先同薑棗煮百合再前成隨症還加減方知藥有靈太陰腹痛咽無澤手足漫暖脈沉實熱邪本是太陽傳桂枝大黃湯可覓柴朴枳實芍藥甘姜煎磨入檳榔汁潮熱喘汗不惡寒加以芒硝共攻擊太陰腹痛便溺赤燥渴譫語脈有力溫熱發黃熟治之茵陳將軍湯枳實山梔甘草朴黃芩滾水煎時加滑石熱結膀胱旋不利須用五苓加味治澤豬茯術桂枝甘瞿滑梔仁燈草濟黃者茵陳渴天花臨服更加鹽四字傷寒熱邪傳於裡少陰厥陰證見矣心腹堅滿繞臍痛煩躁咽乾並譫語或發斑黃與狂亂六一承氣湯調理柴芩枳朴芍硝黃國老薑煎加鐵水陽毒熱深脈洪大三黃石膏湯最快芩連梔柏豉麻黃薑棗芽茶煎服泰去麻豉加實硝黃三黃巨勝湯名載黑豆搗汁加一匙泥漿清水還堪代桃仁承氣對子桂枝枳實硝黃柴胡青草芍相當棗二姜三同放捶入一錢蘇木能除蓄血如狂大便黑物下而康何有熱邪狂妄傷寒熱甚雖不死兩感傷寒漫料理一日太陽少陰病腹痛口乾煩飲水二日陽明合太陰腹滿身熱如火熾不欲飲食鼻內干妄言譫語終難睡三日少陽合厥陰耳聾囊縮不知人厥逆水漿不入口六日為期是死辰治之靈寶葛根羌知母辛芩生地防更有膏柴芎草佐棗姜煎入薄荷嘗冬月芩膏須減卻單令發汗用麻黃消斑青黛與玄參犀角升麻生地入甘草連膏知母在大便實者要將軍煎用水姜並棗子服時加入醋調勻鼻衄不止芩連湯犀角山梔生地黃玄參國老茅根桔吐血去桔換膠良薑棗煎加韭汁墨調勻溫服保安康紙搭鼻沖能治衄炒梔吹入鼻中央燥欲漱水水不下淤血發狂誠可怕加味犀角大地黃玄參實桔當連化丹皮赤芍放紅花椿勻藕汁增高價瘥後昏沉身熱渴錯語失神勞復發柴胡百合草知母芍共參與芩鱉甲生地搗汁加一匙棗姜煎起調如法寒邪直入陰經血並無頭痛與身熱初起止則怕風寒倦臥腹痛渾身厥吐利不渴脈沉遲理中加味功奇絶參朮夏草薑桂陳木香薑汁磨濃啜回陽急救湯桂附茯乾薑參朮陳甘味真寒服此良水調薑汁煮更可入澄漿陰盛格陽時發躁脈來沉伏如何療回陽返本附參苓麥冬五味童男溺桂心國老射炮姜調蜜二匙冷服妙汗下肉潤並筋惕衛虛亡陽脈有力溫經益元湯止之黃耆姜附歸參朮芍藥甘草生地黃棗姜粳米同煎啜痙症有藥如聖飲羌防參朮甘柴引枳殼芍藥白芷芎有汗無汗須詳審有汗去殼加桂枝無汗增麻將術損口噤咬牙加大黃手足攣搐當歸本原知此症胸有痰薑汁竹瀝功有敏三月時候得寒疫頭疼身熱脈有力惡寒體痛口渴者此名晚發宜消息六神湯內藥七味麻草芩蒼膏澤細表證薑蔥豉豆煎里證檳榔磨入劑頭痛甚者加川芎身體痛時羌活濟若然大渴加天花隨症損益難拘泥加味理中湯藥專攻夾食傷寒頭疼身熱不惡寒氣口緊盛脈見青白砂仁朴實橘紅草果蒼甘水姜萊蔔子同煎霍亂亦宜此散少陰證似太陽脈息沉遲可預防身熱惡寒頭不痛急投麻附細甘湯芍藥參連同作劑五味七粒捶煎湯傷寒脅痛胸滿狹心悸嗽痰脈沉滑二陳湯沸實桑柴貝母苓豬桂枝發杏仁數粒臨加服再煮一服乘熱呷神效安神益智消除瘥後虛煩心悸微熱未能安乏力四肢沉倦六七日來昏眊別無刑剋相干脈俱沉服果何然必有將來正汗人茯柴門地遠竹茹知味當甘仍將薑汁炒黃連熱服更無餘患狂言煩躁身無熱精采與常人各別勿將寒藥作狂醫此是如狂證親切治之惟有桂枝湯枝柏甘膀胱澤瀉燈心二十數加姜煎服人安康女勞復有陰陽易其症大熱並錯語小腹絞痛人昏沉足不能移頭不舉眼中生花百節解熱氣衝胸難料理男人陰腫刺小便婦人腰痛並裡急病人新瘥與之交無病人病為之易女勞復因勞太早逍遙湯可涓其疾犀角地茯參韭知連草竹青柴滑石姜三棗二水二鍾燒取褌襠錢半入傷寒下利純清水心痛熱渴並譫語腸胃燥尿結於中非是內寒而瀉起自飲湯藥大便溏可笑庸醫呼漏底結實利者黃龍湯參柴枳實朴硝黃國老芩歸急煎取鐵鏽水調乘熱嘗勞力內傷血氣因而外感風寒頭痛身熱腿中酸微渴憎寒自汗其脈浮而無力須知發表為難調榮養衛病方痊參朮芍歸可選柴草羌防辛地陳耆蔥白鬚連還投薑棗一同煎隨症自增減循衣摸床譫語昏沉乂手冒心肝風肺火兩相因致使撮空牽引湯號清金散火芩連橘草歸參移將芍藥種柴門薑棗金銀煎飲若或內兼痰症姜炒半夏宜尋大便燥熱語無倫一著將軍妙甚惡寒脊強頭疼熱再三發表汗不泄無陽之證醫不知孟浪取汗用火劫再造飲子羌活參桂防朮附甘辛勤佐以芎耆炒白芍棗姜煎入童便勻夏月必須去附子石膏知母宜相親內傷血鬱肝與脾熱渴譫語神昏迷身不惡寒頭不痛勿將寒藥誤投醫病多夾血如見祟藥用當歸活血宜紅芍人參薑桂地柴胡枳朮草抽齊便食譫語大黃利水姜煎用桃仁泥七情內傷痰氣鬱痰若盛時心竅塞挾痰有時見鬼神氣喘沫涎口中出加味導痰湯可涓二陳枳朮並芩連星術栝蔞水姜煮竹瀝薑汁收功全傷寒熱邪傳於心心火炎上逼肺金神昏如醉不能語或時獨語二三聲心下不痞腹不滿目赤唇焦何可禁二便如常無所苦身體又無寒熱侵湯水與之即咽下不與則亦不思尋須知此是越經證瀉心導赤湯宜斟芩連梔草門冬茯知母滑石犀人參燈心薑棗共煎飲生薑搗汁三匙侵傷寒汗下太過元陽虛極無根脈來虛數語無倫熱渴面生赤暈此號戴陽惡證益元湯治如神麥冬芍附草苓參知母童便連飲煎用棗姜活水蔥頭搗汁調勻傷寒六經正病太陽則頭痛身熱脊強陽明則目痛鼻乾不眠少陽耳聾脅痛寒熱嘔而口為之苦太陰腹滿自利尺寸沉而津不到咽少陰舌乾苦燥厥陰煩滿囊縮傷寒脈訣傷寒把足六經詳浮洪緊澀中太陽傳變名狀應須記少陽弦緊陽明長太陰入理沉遲脈脈來沉緊少陰當及入厥陰入深極猝冷無陽脈伏藏太陽無汗麻黃為最太陽有汗桂枝可先小柴胡為少陽之要藥大柴胡行陽明之閉堅至三陰則難拘定法或可溫而或可下宜詳症以治痊傷寒一日二日宜發表而散三日四日宜和解而痊五六日方可議下七八日不愈又復再傳三陽七十二證總訣羌獨前柴梗殼芩升荷芍草葛芎苓還加蒼朮水煎服三陽七十二證寧三陰七十二證總訣芎歸芍附桂麻黃青陳夏朴草芩蒼枳殼桔梗姜共棗三陰七十二證康三陽三陰總法治凡值傷寒不問表裡用敗毒散五積散各一劑春三月加香蘇散夏三月加