且臭者苦瓜蒂五錢甘遂一錢枯礬草烏尖白螺殼各五錢綿裹入鼻坐半日即消又方白礬末加硇砂少許吹之或用豬油調綿裹塞鼻又方甜瓜蒂細辛等分為末塞鼻再與勝濕湯瀉白散各一帖治鼻癰緑礬一錢雄黃五分絲瓜蒂二個麝香少許為末搐鼻並治息肉咽喉門與外科參看辨證咽以咽物接三脘以通胃喉以候氣長九節以系肺並行不悖氣谷分焉其人胸膈素有痰涎因傷酒而動胃火傷色而動腎氣忿怒而動肝火火動痰升塞於會厭兩旁腫大則為乳鵝脹小則為喉閉熱結舌下為子舌熱結舌中為木舌熱脹於外麻癢腫大為纏喉風猝然腫痛水漿不入語言不通者為走喉風古人皆謂之喉痹治法急則治其標用丸散吐痰散熱緩則治其本用湯藥降火滋陰寸脈浮洪而溢者痹也微而伏者不治甘桔湯桔梗三錢甘草一錢五分防風荊芥薄荷黃芩玄參各一錢水煎嚕咽喉痛加鼠黏子竹茹咳逆加陳皮嗽加知母貝母渴加五味子唾膿血加紫菀肺痿加阿膠面浮加茯苓嘔加半夏氣弱加人參麥冬口赤加梔子黃連聲啞加半夏桂枝胸膈不利加枳殼胸痞滿加枳實不臥加梔子酒毒加乾葛陳皮膚痛加黃耆疫毒頭痛加鼠黏子芒硝大黃發斑加防風荊芥治喉痹方荔枝草牛膝草搗汁加艾葉汁和人乳漱之或滴入鼻內再頻飲夏枯草湯急救喉痹方楊梅樹皮向東者去粗皮為末或皂角末俱吹入鼻中噴嚏為驗又方硃砂三分二釐硼砂一分二釐枯礬膽礬俱一分六釐雄黃焰硝片腦各一分麝香少許併為末吹入喉中勢急者以鵝管削尖刺破春風散臘月初一用殭蠶黃連朴硝白礬青黛等分貯豬膽內懸於地坑中至立春日置有風處吹乾研末吹喉清上丸治喉中諸症雄膽一分雄黃青鹽各五分硼砂一錢薄荷葉五錢膽礬少許化白糖霜為丸如芡實舌壓一粒噙化清香散治失音者訶子一錢半生用一錢半泡熟木通同上甘草同上桔梗三錢生用生地五錢搗入藥餘論喉痛因虛火上升法當從治桔梗甘草玄參防風羌活荊芥白朮升麻茯苓少加乾薑附子為嚮導徐徐治之為當若驟用涼藥則火益結是害之矣滾痰丸方見痰飲牙齒門辨證齒者腎之標也足陽明胃脈絡齒上齦手陽明大腸經之脈絡下齦呷風則痛甚者腸胃有風邪也噦嗅者腸胃有積熱也蟲食者腸胃有濕熱也動搖者腎虛也獨活散驅風熱獨活散內川芎真羌活荊防薄荷成生地黃兼細辛使煎來漱咽治牙齦甘露飲治胃中客熱齒齦腫悶宣露甘露兩地山茵陳天麥枇杷枳殼芩石斛甘草十味等男婦喉牙客熱平白芷湯治下片牙疼虛熱有風防風荊芥連翹白芷薄荷赤芍石膏細辛湯治上片牙痛胃腎虛風蔓荊子牛蒡子蓽茇各一錢五分細辛升麻黃連防己各錢黃柏知母薄荷各七分水煎溫服哭來笑去散雄黃胡椒麝蓽茇良薑細辛只六味哭將來笑將去等分為末用少許吹男左女右鼻中立止如腫甚用紙卷藥末作條蘸香油點火燎牙痛處條盡即止又方用蠟肉骨燒灰存性為末隨痛隨擦漱口方露蜂房鶴蝨秦艽防風各二錢煎湯漱口涼則吐去鮑氏八味湯隨經分治防風荊芥升麻各七分當歸生地丹皮青皮細辛各五分上門牙屬心加黃連門冬下門牙屬腎加黃柏知母上邊牙屬胃加川芎白芷下邊牙屬脾加白朮白芍上左盡牙屬膽加羌活膽草下左盡牙屬肝加柴胡山梔上右盡牙屬大腸加枳殼大黃下右盡牙屬肺加桔梗黃芩滿口痛本方加石膏甘草舌長拖出數寸以冰片塗之即收單方巴豆一個入火略燒去殼胡椒三粒同搗爛薄綿包藥痛齒咬定流去涎水良久取出如止一二牙疼痛多是蟲痛去胡椒用花椒又方用壁錢包胡椒末塞耳左痛塞右右痛塞左手掩枕之少頃額有微汗即愈又方治蟲牙好信黃丹各一分溶黃蠟丸如豆大薄絲棉包裹留尾如上法塞入耳孔一夜其蟲即死永不再發又方明雄黃食鹽各三分老薑三錢同搗分三丸噙之一連化盡即止又方臭椿根背陽皮煎湯漱口亦好又方用小麥炒焦淬入燒酒去渣噙漱又方草烏潮腦各一錢川椒五分共為末用碗對合鹽泥封固炭火徐炙之則藥升起取搽牙痛立止又方冬青葉搗汁漱口又方大戟咬在疼處即止又方用黑豆一撮蔥艾川椒水煎漱餘論法宜瀉陽明之濕熱外以擦牙誅蟲之劑治其標則齒自固牙疳見外科固齒方見末卷治齒方青鹽二兩白鹽二兩川椒四兩煎汁以椒汁拌二鹽炒乾為末擦之永無齒疾以漱出水洗目亦無目疾治口臭孩兒茶四兩桂花硼砂薄荷葉各五錢甘草熬膏作餅噙化又方丁香黑棗搗勻噙化又方常噙藿香一味治撮口不能開合不治即死者白布作炷如指大安斧上燒出汗抹搽唇上日二三度或用青布灰或蛇蛻灰或發灰或蜂房俱用脂調搽治舌腫硬百草霜海鹽等分井水調敷或用真蒲末或用槐花末頻摻舌上若舌長出用冰片塗之俱宜內服黃連湯以瀉心火治牙疼搖動栝蔞仁五分牙皂四分川烏草烏胡椒藜蘆各三分麝香一分於牙根內外遍擦之吐出涎愈又方巴豆一粒咯煨去殼胡椒三粒同研絹包痛牙咬定流去涎水又方巴霜鉛粉麝各少許同蒜搗如豆貼手腕右疼貼左左疼貼右又方楓樹子一名九孔子十粒煎湯漱口不可咽下又方楊柳枝皮切碎火酒一盅煎半盅漱口又方蔓荊子白蒺藜等分炒黑研末擦之一方加鹽脅痛門脅痛須分左右治左屬血虛右屬氣左緣肝火木氣充右必痰流兼所滯左疾加減四物湯芍藥芎歸熟地黃白朮陳皮甘草茯玄胡枳殼木香當但痛不移淤作祟紅花蘇木桂桃姜小柴胡湯治右痛半茯柴芩甘殼共木香大腹與青皮白朮香附煎可送復元通聖散復元通聖穿山甲青陳甘草栝蔞屑每用熱酒下一錢諸痛諸瘡和血氣當歸龍薈丸治內有濕熱兩脅痛甚者此乃瀉肝火之要藥當歸龍膽草山梔黃連大黃酒炒蘆薈青黛各五錢木香二錢五分麝香五分另研加青皮柴胡五分神麯丸如梧子薑湯下三十丸香桂散治婦人脅痛香附四兩醋一碗鹽一兩煮乾肉桂白芍玄胡炒各二兩每服三錢空心滾湯調下單方治脅間刺痛屬氣者枳殼麵炒黃二兩半甘草炙七錢每服二錢濃煎蔥白湯下餘論脅痛肝火盛者居多間有瘀血痛甚而元氣實者用桃仁承氣下之方見傷寒或因痃癖痛者煮黃主之方見心痛凡脅痛用青皮必須醋煮過臂痛門辨證臂有風寒痛有濕氣痛有痰飲痛因睡露肩偶然痛者風寒也宜五積散因素受濕雨天甚者濕氣也宜蠲痹湯加蒼朮防己兩手軟痹肩背痠痛者痰飲也宜導湯加木香薑黃五積散見中寒蠲痹湯見痹導痰湯見痰飲單方漏肩風痛向外坐門限上用木棰烘熱趕痛處七次即愈背痛門辨證背心一點痛者痰濕氣也宜烏藥順氣散合二陳湯或香蘇散加蒼朮羌活體虛人背惡寒婦人産後冷痛宜禦寒膏烏藥順氣散見中風香蘇散見傷寒禦寒膏治背痛惡寒及一切冷痹並治濕氣生薑半斤取汁牛皮膠三兩乳香沒藥各一錢五分銅銚內煮化移在熱湯內燉以柳條攪至成膏加花椒末少許再攪勻用皮紙攤貼患處用鞋底烘熱尉之候五七日脫下或起小疹不妨一方加草烏一兩諸痛尉法韭菜連根搗爛醋拌炒絹包尉痛處脾胃門脾胃屬土居中位受納水穀滋營衛水穀盡兮營衛亡安穀則昌絶則斃一有不足為內傷醫家值此須審詳勿作外感有餘治交泄之時定見殃六君子湯蓋調理白朮參苓甘草比陳皮半夏炒砂仁三斤生薑二鍾水內傷之症何所成飲食勞倦並七情治須先用補元氣看所挾者而加增挾痰挾邪挾鬱熱補中益氣湯多用甘草參耆為操縱陳皮白朮當歸身柴胡升麻八味共或停飲食將如何不足之中繼有飲氣口脈來而緊盛先須道者自然除腹痛門腹痛蓋緣脾上虛次分寒熱食三居或有濕痰或死血悠悠而痛為多寒脈必沉而又無力加減理中湯可識乾薑甘草殼陳皮厚朴砂仁並白朮煎加沒藥與乳香又入木香磨薑汁外有肉桂茱胡索春夏去之冬可著時痛時止熱治之脈浮無力何方治小柴胡湯參可去檳榔芍藥卻宜加枳殼砂仁玄胡索水姜煎來以前施痛後利減為食積關腹緊浮而有力平胃方加大腹皮草果檳榔並枳實砂仁白朮曲玄胡依舊煎入木香汁小便不利濕痰兼左關無脈緩無力二陳湯用蒼白朮木香通附豬苓實生薑三片水二鍾更添薑汁和竹瀝死血痛定而不移左寸浮澀四物移亦加乾薑及甘草紅花蘇子牡丹皮桃仁枳殼玄胡索陳皮相合五靈脂脈洪細小遲易治數而堅緊定難移理中湯見傷寒小柴胡湯見傷寒平胃湯見傷食二陳湯見痰飲四物湯見婦人科餘論腹痛有塊撐起急以手按之便不見五更心嘈牙關矯硬噁心吐清水夢中齧齒者蟲也治同蟲攻心痛腰痛門腰痛屬足少陰經濕熱痰淤虛作成脈大為虛緩為濕澀為瘀血最分明脈來滑伏痛為祟面有紅星死者刑天陰而痛為濕熱蒼白茯陳甘草列柴胡枳殼炒山梔青皮茴香木通設日輕夜重瘀血痰芎歸芍地桃甘陳紅花官桂蘇防木玄胡丹參古有名腎經虛者長長痛知母茴歸與杜仲快將參朮補骨脂五味黃柏熟地用立安散治氣滯並閃挫及腎虛腰痛當歸杜仲姜炒官桂玄胡索炒黑醜半生半熟小茴香炒各一兩木香五錢為細末每服二匙空心黃酒調下加味青蛾丸治腎虛腰痛或風寒血氣搏痛杜仲薑汁浸炒破故紙水淘淨同芝麻炒變色去麻瓦上焙乾各十二兩胡桃肉去皮研加沉香沒藥乳香各六兩為末用肉蓯蓉十二兩酒浸成膏和藥杵千丸如梧子空心溫酒或鹽湯下三十丸五積散方見中寒因寒加茱萸五分因風加防風全蠍因閃挫加桃仁黑醜滲濕湯治濕痛方見傷濕當歸拈痛湯治濕熱方見腳氣餘論腰為腎之外候一身所恃以轉移者也其所感雖不同大約腎虛而後痛客病既除即以補腎為要治脅下疼痛神效小茴香炒一兩枳殼麩炒五錢共為末每服二錢鹽湯調服治腰痛或時閃腰杜仲胡桃仁破故紙三味酒煎服立效又方用橙子核炒乾為細末三錢以白酒調服即愈又方用西瓜青為片陰乾為末以鹽酒空心調服立效腰痛立安散杜仲去皮炒斷絲橘核炒取仁二味各等分為末每服二錢入鹽少許食前湯酒服疝氣門古來疝氣厥陰肝腎部從來無所幹食積濕痰亦寒鬱前人分作七般看止痛飲子最端的青皮茴香並枳實茱萸甘草茯陳歸桃仁梔子通蒼朮生薑三片水同煎三錢炒黃荔子核五靈又是一方名澤瀉豬苓共茯苓白朮桂檳川楝子木通橘核小茴香一方白朮參耆芍茱萸乾薑玄胡索歸身澤瀉巴戟天甘草茴香用八角香蘇散見傷寒香蘇散加小茴香木香三稜蓬朮木通治偏墜初寒熱疼痛甚佳單方治疝氣吳茱萸去梗湯泡枳殼麩炒各八分酒煎服取汗為度又方葫蘆巴銅鍋內炒研末空心好酒熱服三錢數日而愈又熏洗方苦參紫蘇葉石菖蒲各四兩煎滾入瓶熏之口中飲酒疝中如針刺待溫洗之治偏墜方鵝卵石一個火燒紅入酒碗內轉七轉空心飲下治崑崙氣入小腹痛鮮沙參搗汁和酒儘量飲之餘論經有七疝寒水筋血氣狐潰也諸方甚多效者少見若用黑醜檳榔等藥克伐破氣非徒無益而又害之矣此疾於人無大害苦痛時服藥數劑痛止宜聽之治偏墜小腸氣神效方大黃五錢火上炙乾香白芷二錢五分麝香半分穿山甲一錢五分加黃土炒過白殭蠶二錢乳香沒藥各二錢五分共為細末當歸煎水熬膏為丸分作二分每早空心一服好酒送下又方用雙蒂茄子懸於房門上出入用眼之茄淹亦淹茄干亦干矣又云小兒偏墜用雙茄懸門上每日抱兒視二三次鐵釘於上十餘日消治偏腎疝氣煮酒方棠棣根即山楂樹根去粗皮洗淨四兩小茴香一兩用北方者鹽水和勻炒川歸五錢木香三錢川楝子去核炒用一兩破故紙五錢炒青皮三錢麩炒上為粗末以絹袋盛之懸於壇內用無灰酒五壺以箬如法封固煮一二時再埋土中三日空心隨量服治下元虛損偏墜玉莖疼痛好茅山蒼朮六斤一斤老米泔水浸三日夜一斤酒浸三日夜切片曬乾一斤用斗子青鹽半斤炒黃色鹽不用一斤小茴香四兩炒黃色去茴香不用一斤大茴香四兩炒黃黑色茴香不用一斤桑椹子二斤取汁制曬乾以上共為末每服三錢酒下治腎囊偏墜牡蠣煅良薑各一兩為細末津唾調敷大便須臾如火熱者痛即安腳氣門下元氣弱因感受風寒濕熱成斯疾瘡積流注亦有之入腹攻心定難救總有蒼朮健步湯青陳蒼白朮瓜當生地柏連防己入豬牛龍膽納檳榔左尺不應病難全寸口無常君莫治婦人足腫痠麻痛生地川芎蒼柏星牛膝紅花草龍膽食前煎服便能行辨證兩脛腫脹為濕腳氣宜當歸拈痛湯或五積散加檳榔木瓜青藤穿山甲足膝枯細為乾腳氣宜十全大補湯加牛膝木瓜石南藤五加皮沒藥川烏檳榔散檳蘇散內香蘇多甘草陳皮檳瓜半和薑蔥煎服治腳氣風濕驅除效若何當歸拈痛湯治濕腳氣及骨節疼痛瘡毒等症拈痛羌茵甘草苓歸知澤米共豬苓防風蒼朮加升葛還有人參並苦參首句各一錢次句各五分下二句各四分是也防己飲防己柏蒼並白朮檳榔生地川芎沒犀屑草梢通與連七五三分次第及內熱加芩熱甚及暑天加石膏大便祕加桃仁小便澀加牛膝木瓜薏苡仁臂痛加威靈仙脅痛加膽草風甚加川萆薢濕甚加木瓜食積甚加山楂神麯麥芽足氣衝心合四物湯肥人宜加痰藥健步丸生地陳皮白芍各一兩半蒼朮歸尾各一兩牛膝條芩吳茱萸各五錢大腹子三錢桂枝二錢蒸餅丸如梧子白朮木通各一錢煎湯食前送下八十丸五積散見中寒十全大補湯見撈瘵單方治腳腫拘攣威靈仙川牛膝等分為末煉蜜丸如梧子空心酒下忌茶治濕熱腫痛鉛一斤入鍋熬化將酒衝入止飲酒痛自止至重者三服餘論脾主四肢油膩厚味茶酒面食不能節制鬱而生熱熱流於足而山嵐卑濕涉水冒雨足先受之濕熱相搏足疾生矣其初起時惡寒發熱狀若傷寒惟足脛紅腫或筋攣痛此為別耳輕者只於足痛重者由足入陰抵小腸歷脅肋上於頭又重者腳氣衝心誤治立死輕者先散其寒重者退其熱佐以滲濕下行之藥苟非足膝細勢來緩者斷不可驟用補氣藥治濕神效煮酒方五加皮三兩宣木瓜三兩用無灰酒三大壺入小瓷瓶內將藥㕮咀亦入瓶內將坐放滾湯鍋中酒數沸取出冷一宿空心飲六七杯治腳轉筋急將大蒜磨腳心令偏熱即瘥治腳氣昔人見一縉紳於劇暑時置一布囊下用爐火以足踹上叩之則云舊有腳氣疾近得一方用川椒二三斤實於疏布囊中跣足踏上因椒氣惟熱闢去寒熱也越數年間其疾療後傳知親知無不效者後又有加破開檳榔並熱艾各三分之一亦妙真良方也女科門婦人尺脈盛右手脈大皆其常也血盛氣衰為從從則百病不生孕育自成然婦人見理不明胸襟窄狹動多鬱怒怒氣傷肝肝動克脾脾不運化而生濕濕生痰痰生熱熱生風而癥瘕淋閉崩漏帶下之病生急宜治其標風則疏之熱則清之痰則化之濕則利之諸病各從類治緩宜治其本平肝補脾抑其氣以行其血此其大凡也是故古人動用二陳湯化痰燥濕四物湯補血香附破氣黃芩清熱柴胡平肝白朮補脾雖千變萬化不離此乎加減二陳湯治雜症二陳橘半茯苓草清氣化痰為至寶膈上不寬加枳桔火旺生痰黃芩好參朮加名六君子健脾和胃無如此中脘寒疼去了參香砂配用皆能止飲食過餐不克消曲柏山楂厚朴調再加枳實黃芩炒何愁體弱脾胃嬌咳嗽生痰分冷熱熱即芩連並枳桔寒痰枳縮配原方順氣胸中痰自減風寒外感嗽何醫二陳橘半與前胡乾葛桑杏能消導東垣名此號參蘇二陳半夏性本燥血虛煩渴皆不要四物湯中不必加貝母代之專取效人有風痰疾病生天麻白芷皂南星濕痰在胃心多嗽二術任須配二陳火鬱胸中老痰結滯住咽喉咯不出半夏蔞姜附桔連少助玄胡痰自減痰在經絡及四肢薑汁遂將竹瀝施胸胃有痰須枳實脅間白芥即能除溫膽湯加升茹實寧神豁痰為第一若加枳實共南星湯號導痰能利膈去草陳皮四七湯加添蘇朴與生薑散郁消痰兼理氣孕生惡阻用之康嘔吐皆因胃火炎脈來洪數嘔連綿急用此方加枳實竹茹煎服炒黃連若還藥也吞不下檳榔須少蘇木煎五六月來痛不休心中納悶手難揉多加枳朴芩連芍便閉硝黃一服療嘈雜噯氣一般看胸中積熱與停痰石膏香附並星下二陳加減有何難悶脹吞酸與吐酸本方加入炒黃連水停心中名為飲枳茯豬苓利小便此是二陳加減法休要浪與世人傳加減四物湯婦人雖則有專工余病皆與男子同獨有胎前與産後血崩經候滯難通古人故令立四物加減君臣仔細述血枯經閉加桃仁蘇木馬鞭亦可入軀脂滿閉去地黃二陳再合莎連實瘦則血枯經閉肥則軀脂滿閉血實不行腰腹痛調胃承氣同之用大黃四錢甘草二錢水二鍾先煎至一半入芒硝三錢溶化服或只芎歸加蓬桂血瘀越曲丸為貴經水過期是血虛加入升陳柴木耆不及期兮是血熱熱則紫黑並塊結俱用參連香附切經水澀少和葵紅過多參朮與之同適來適斷髮寒熱宜與小柴胡相合經水作痛是血實木香玄胡與蓬朮若夏熱兮加芩柴再與桃紅莎連吃經後作痛血虛症四君子湯兩相併赤白滯下腹微痛脈沉微兮姜共桂若治血崩有異方或入荊芥或乾薑又方加入莎草根蒲榆升術耆與參煎調稷灰六七分且用續斷以為君安胎生薑參朮芩砂仁紫蘇甘與陳胎痛香附同為末紫蘇湯調服幾帖有胎噁心名惡阻姜炒梔連二陳佐有胎下血多胎漏膠陳梔柏木甘授孕而煩亂曰子煩參遠神梔芩術甘子腫桔蘇與滑石大腹枳殼黃芩入胎上作脹名子懸芩莎砂殼及陳甘子癇猝倒加柴芩汁瀝莎甘術與陳産難前方還去地更加益母並芷桔熱服加射兩三分燒取男發蛇蟬蛻産後惟宜大補血雖有餘痰從末治去芍藥兮易黃耆恐其酸寒伐生氣氣虛加參朮茯甘發熱乾薑為要劑自汗多者少川芎渴加五味麥門冬腹痛非芍則不可但以酒炒不為凶惡露不去腹作痛香附靈脂效若神為末調入前湯內甚則桃仁四五分子宮未斂而作痛酸炒芍甘粟殼共入少米醋酸以收或只山楂入糖用惡露不去發寒熱更加稜蓬莎乳沒靈脂乾漆桃仁捷腹痛不息加香附烏藥陳桂良薑佐煎入童便與米醋月餘經血淋不止加入升麻及白芷血餘燒灰調服之陰痛更加防藁餌遍身浮腫加乳沒桂通大腹良薑捷檳榔金沙並血竭子腸不收合四君黃耆蜜炙入防升口眼喎歪似中風亦合四君用最工荊芥附子還加入少佐羌活並防風四物湯輕重解川芎理肝春宜倍弦宜倍頭痛宜倍白芍理脾夏宜倍洪宜倍泄宜倍地黃理肺秋宜倍澀宜倍細虛宜倍當歸理腎冬宜倍沉宜倍寒宜倍四物四時使春加防風夏加黃芩秋加天冬冬加桂枝加減逍遙散治脾虛發熱或潮熱或自汗盜汗或頭痛目澀或怔忡不寧頰赤口乾或月水不調或肚腹作痛或小腹重墜水道澀痛或腫痛出膿內熱作渴當歸酒洗白芍酒洗白朮土炒柴胡酒炒白茯苓以上各一錢甘草炙五分煨姜一片薄荷少許共煎服發熱加地骨皮知母手顫抖加防風荊芥薄荷咳嗽加五味子紫菀氣惱胸膈痞悶加枳實青皮香附吐痰加半夏貝母栝蔞仁飲食不消加山楂神麯發渴加麥門冬天花粉胸中發熱加黃連梔子心慌心跳加酸棗仁遠志肉久瀉加黑姜遍身痛加羌活防風川芎吐血加阿膠生地丹皮自汗加黃耆酸棗仁左腹血塊加三稜莪朮桃仁紅花右腹氣塊加木香檳榔怒氣傷肝眼目昏花加龍膽草黃連梔子白豆蔻經閉加桃仁紅花蘇木小腹痛加延胡索香附米柴胡散治婦人寒熱往來體疲肢節疼痛心煩口乾不欲飲食北柴胡白朮黃耆赤茯苓各一兩人參地骨皮枳殼制生地桔梗桑白皮赤芍藥各七錢五分鱉甲醋炙二兩麥冬三兩甘草五錢每服一兩用生薑煎服小柴胡湯治婦人傷風七八日後寒熱發作其時經水適斷此為熱入血室其血結故如虐狀柴胡八錢人參甘草黃芩生地各三錢半夏麥冬各二錢每服八錢薑棗煎服又方用柴參芩草合芍地芎歸是為柴胡四物治虛勞寒熱烏金丸婦人三十六病思慮過度變生疾不孕崩中帶下五心煩熱口渴苦咽乾飲食無味身疼羸瘦面目萎黃手足痠軟經水不勻臍腹脹痛發黃落喜臥倦起産後惡血上行心腹刺痛敗血不止及子宮一切惡疾用大艾葉當歸醋煮茴香炒熟地醋炒南木香不見火吳茱萸三稜莪朮各兩川芎醋炒芍藥醋炒各三兩香附子六兩玄胡索一兩紫荊皮四兩醋炒上先將艾香二味醋五升浸一日夜冬月三日夜煮乾炒令赤色入後十二味同為末米醋煮元米糊丸桐子大每服七八十丸空心鹽酒湯任下一日二服如崩中下血不止加粽灰一兩綿灰五錢蒲黃炒一兩百草霜七錢烏雞丸治婦人羸弱血虛有熱經水不調崩漏帶下骨蒸等疾用白毛烏骨雄雞一隻重二斤半許閉死去毛腸用艾葉四兩青蒿四兩銼碎納一半在雞腹內將酒罈盛雞並余蒿艾瀣便和水沒雞二寸煮絶干取出去骨搗爛如薄餅狀焙乾研末南香附去毛一斤分四分用米泔童便酒醋各浸之春秋二日夏一日冬四日取出曬乾熟地生地各四兩芎歸芍參術各三兩黃耆川牛膝黃連丹皮去心知母貝母地骨皮各二兩柴胡秦艽各一兩半乾薑玄胡索各一兩白茯苓去皮二兩五錢鱉甲三兩醋浸炙黃色二十四味共為細末醋糊丸如梧子大服五十丸漸加至八十丸酒下或米飲下忌莧菜及煎炒辛辣之物經閉婦女經脈不行或因多産傷血或因墮胎或因久患潮熱傷血其因脾胃傷損而致者甚多不可便認作死血遇此證須審其脾胃如何若飲食勞倦泄瀉或誤服汗下攻克藥以致血少不行只宜緩治以白朮為君茯苓芍藥為臣佐以黃耆甘草陳皮麥芽柴胡芎歸等藥補脾生血經自行矣亦有飲食積滯者宜消積若脾胃無病及無別證果有血塊凝結方宜行血通經神應丹治經不行有實熱五心煩熱口燥咽乾心忪額赤胸膈不利咳唾稠痰大黃八兩醋二碗煮乾曬血竭桃仁紅花各五錢酒糊丸如桐子大硃砂為衣每服七十丸又醫案一婦人虛勞發熱盜汗咳嗽面紅經閉脈數有力以滋補藥投之不效用大黃酒蒸曬九遍四兩血竭沒藥各五錢用四物加紅花煎湯送下七十丸三服而前疾盡除矣加味八物湯治經閉虛熱咳嗽用四物四君子加柴胡黃芩小茴香煎服腹痛加玄胡枳殼乾膝嘔吐惡加良薑砂仁手足麻痹惡寒加肉桂咳嗽加杏仁五味子款冬花劉河間曰心主血心病則不流先服降心火之劑次用局方中五補丸後以衛生湯理脾養血衛生湯黃耆三兩當歸白芍各二兩甘草一兩每服五錢如虛者加人參空心溫服又丹方蠶砂四兩沙鍋炒半黃色就入無灰酒一壺於內沸過以瓷器盛之去砂溫飲一盞即可通又方大船上多年灰條用炭火燒紅淬入燒酒取出待乾為末每服三錢初用酒下次紅花酒下次大黃酒下三服見紅如神又方治鬼胎經閉用芫花三兩炒黃色為末每服一錢桃仁湯下取出惡物神效崩漏經已久止忽而大下腹痛身熱曰崩屬陰經行三十日猶湧出不止曰漏屬陽按脈數洪而疾疾漏下候也崩之為痛血大下豈可為寒但血去後其人必虛當大補氣血崩後脈疾者死遲者生緊大死虛小者生丹溪曰有虛有熱內經曰陰虛陽搏崩漏丹溪論血崩當分寒熱急則治其標用白芷湯調百草霜末甚者用陳棕灰後用四物湯加炒乾姜調理因勞者用參耆帶升補藥因寒者用乾薑甚者用附子因熱者用黃芩崩過多者先用五靈脂半生半炒為末酒下一服又方同生芝麻嚼下每日六七次其疾痊愈蓋五靈脂能行能止紫色成塊者熱以四物湯加黃連之類血崩用香附白芷丸服氣虛血虛以四物湯加參耆漏下乃熱而虛四物加黃連崩中白帶用椒末又用白芷石灰炒去灰為末茜草少許粥丸服一方用生狗頭骨燒灰存性酒調下或入藥服升麻四物湯崩漏不問虛實用四物加升麻防風加荊芥穗燈上燒服之如不止加白朮蒲黃及諸止血藥血崩屢驗方當歸白芍棕棕乾薑各燒灰存性為末醋湯調以有節紅筋左攪四十九轉食前服當歸龍骨丸月事失常經水過多及帶下淋瀝無問久新赤白諸症併産後惡物不止或胎動不安疼痛及大人小兒並可服用當歸黃連槐子艾葉炒茯苓各五錢龍骨黃柏各五錢木香二錢滴水為丸小豆大每服五十丸食前米湯送下固腸丸椿根白皮炒為末酒糊為丸治濕氣下利便血及白帶去脾胃陳積之疾用此以燥其涇不可單服須看病作湯用如有孕白帶用蒼朮三錢白芷二錢黃連炒二錢黃芩三錢黃柏炒一錢五分白芍二錢五分椿根白皮炒一錢五分山茱萸二錢五分糊丸空心酒下五十丸丹方黃芩研細末燒稱錘淬酒調下三錢食前服又方甜杏仁上黃皮燒灰存性空心熱酒下三錢又方蓮蓬燒灰存性酒下二錢又方白礬水飛過麵糊丸如指頭大每服一丸黃酒送下又方天靈蓋燒灰每服黃酒下二錢又方黑驢糞燒灰存性麵糊丸空心酒下六七十丸又方烏梅燒灰烏梅湯下餘論凡血崩乃經脈錯亂一二日不止便有瘀血凝成窠柏若驟用藥住澀必見增劇宜以五積散防風荊芥投一二服次進獨行散以霹靂酒下二三服如不止方用止血藥止之帶下赤屬血白屬氣因素有濕熱産育房勞傷於營衛濁氣滲入膀胱故流穢物世俗之方多用燥熱止澀雖亦偶效因此延綿蓋知下焦虛寒不知中焦濕熱也治之之法大約宜清上實下理脾養血清心薄滋味帶自除矣丹溪以燥滋先為用二陳湯加蒼朮白朮甚者用吐以提其氣肥人多是濕痰用海石半夏南星炒黃柏蒼朮川芎椿皮瘦人白帶少如有者多熱以炒柏滑石椿皮川芎海石如無海石以蛤粉亦可無椿皮以青黛作丸子服實者可下虛者不可峻攻如血虛者加減四物湯氣虛者參朮陳皮間與之濕勝者用固腸丸相火動者於諸藥中少加黃柏滑石加龍骨赤石脂滯者加葵花白花治白帶赤花治赤帶性燥加黃連痰氣加蒼朮香附滑石蛤粉半夏茯苓丸服寒月少加乾薑臨機應變須斷厚味清白散治白帶四物加黃柏乾薑貝母甘草樗根白皮生薑煎服肥人多濕疾加白朮半夏兼赤加條芩酒炒荊芥久下加熟地牡蠣氣虛加參耆腰腿痛加鹿角膠若用烏雞丸更妙河間論濕熱不散先以十棗湯下之後服苦楝丸帶自除矣苦楝碎酒浸茴香炒當歸各等分為末酒糊丸如桐子大每服三五十丸空心酒下如用大玄胡散調下更妙十棗湯見局方鮑氏方治赤白帶紅棗煮熟去皮芝麻微炒二味杵如泥茅山蒼朮米泔水洗炒研末等分三味共搗丸如桐子大三錢一次滾湯攜空心此藥宜常服止帶調營頗合宜單方治白帶白果肉四兩硫黃研一錢二味同炒果熟去黃空心鹽湯嚼下數料即止又方白鳳仙花為末初服三錢次服二錢又次服一錢三日即愈至重者從五錢起減至一錢五日痊愈俱空心酒調服又方紅帶用紅雞冠花白帶用白雞冠花燒灰存性研末酒下二三錢又方用絲瓜根切片大酒拌七次研為細末空心酒下又方用經霜桑葉研末酒下三錢丹溪論婦人經少過期血少也四物加參朮帶痰加南星半夏陳皮經少不及期而來血熱也四物加芩連過期紫黑有塊亦血熱也必作痛四物加香附黃連過期淡色來者痰多也二陳加川芎當歸過期而來是血虛宜補血四物加黃耆陳皮升麻未及期先來是氣血俱熱宜涼血調氣柴胡黃芩當歸白芍生半夏香附經不調而血水淡白宜補氣血參耆芎歸香附白芍兼腹痛加膠珠艾葉玄胡經過後而作痛乃虛中有熱所以作痛經水將來作痛血實也一雲氣滯加桃仁黃連香附臨行時腰疼腹痛是鬱滯有瘀血四物加紅花桃仁莪朮玄胡香附木香如發熱加黃芩柴胡紫色成塊者熱也四物加黃連柴胡痰多占住血海地位因而下多者目必漸昏肥人如此用南星蒼朮川芎香附作丸服之肥人不及日數而多者痰多血虛有熱亦用前丸藥中更加黃連白朮丸服血枯經閉者四物加桃仁紅花軀脂滿經閉者以導痰湯加黃連川芎不可服地黃泥膈故也如用以薑汁炒肥胖飲食過度之人而經水不調者是濕痰宜蒼朮半夏滑石茯苓白朮香附川芎當歸如臨經來時肚痛者四物加陳皮玄胡牡丹甘草若痛甚者豆淋酒痛緩者童便煮砂仁炒條芩為丸經水去多不能住者以三補丸加莎根龜版金毛狗脊陰虛經脈久不通小便澀身體疼痛四物加蒼朮牛膝陳皮生甘草又用蒼莎丸加蒼耳酒芍藥為丸就煎前藥吞下經水過多黃芩炒白朮炒龜版炙各一兩黃柏炒三錢椿根白皮七錢五分香附子二錢半共為末酒糊丸白湯空心下五十丸積痰傷經不行夜則妄語栝蔞仁一兩蒲黃五錢吳茱萸十粒桃仁五十粒紅曲二錢砂仁三兩麻渣木為末生薑汁化炊餅為丸桐子大空心下百丸一切瘀血作痛香附四兩醋煮瓦壠子二兩煅醋煮一夜桃仁二兩牡丹皮一兩大黃蒸熟一兩川芎五錢紅花五錢共為末蒸餅為丸桐子大空心溫酒下三五十丸大溫經湯治衝任虛損月候不調或來多不已或過期不行崩中去血過多或經損娠瘀血停留小腹急痛五心煩熱川芎當歸白芍人參甘草阿膠肉桂丹皮吳茱萸各二兩湯洗七次半夏二兩半麥冬去心五兩半每服五錢姜煎空心熱服地骨皮散治血風體虛發渴寒熱地骨皮柴胡各一兩枳殼前胡黃耆各六錢半白茯苓五加皮人參甘草官桂白芍各五錢每服一兩姜三片煎服先天歸一湯人參八錢白茯苓去皮一兩白朮一兩麩炒甘草四錢當歸一兩二錢酒洗川芎一兩生地一兩酒洗白芍八錢川牛膝八錢酒炒香附砂仁炒半夏丹皮各七錢陳皮六錢以上十四味均作十劑經未行先服五劑後服五劑姜煎空心服渣再煎臨臥服經調脈和即當孕如子宮久冷加乾薑肉桂各五錢如冷盛灸腹下三寸極效子宮太熱加黃柏知母柴胡各六錢白帶白濁白淫倍半夏加白芷一兩升麻五錢氣滯加木香三錢虛勞自汗或惡寒發熱加黃耆肉桂咳嗽加阿膠貝母各四錢勞熱血枯加柴胡鱉甲飲食減少倍白朮陳皮加厚朴神麯各五錢肥人痰塞子宮加南星三稜各六錢有瘀血加桃仁玄胡子紅花各四錢蓬朮五錢如未效去參加五靈脂二個半生半炒乳香三錢腰腿痛加杜仲一兩桃仁四錢羌活三錢經行後疼者虛也加當歸八錢熟地六錢五味子三錢腹痛有痞者去牛膝加三稜莪朮各六錢桃仁枳實各五錢前五劑加檳榔五錢鬼胎先服桃仁乾膝肉桂麝香之類去之然後服此方經前期至者加黃柏蒲黃各五錢後期至者加乾薑丹皮各五錢崩漏加蓮蓬灰黃芩各五錢熟艾三錢豬骨灰六錢白芷六錢有風寒濕氣加羌活七錢乳香沒藥蒼朮各五錢秦艽三錢心腹痛加大腹皮木香各三錢檳榔五錢小便澀少稍加豬苓澤瀉室女澀滯不調加劉寄奴六錢不效加衛茅三錢一名鬼箭羽神效種玉湯婦人無子為七情所傷致血衰氣盛經水不調或淡或紫崩漏下帶肚腹疼痛子宮虛冷不能受胎宜服南芎當歸四錢酒洗熟地六錢白芍一錢陳皮茯苓延胡丹皮炒姜各三錢香附吳茱萸炒各四錢官桂熟艾各二錢過期而淡者加薑桂艾先期紫色者不必加減以上十三味分四劑經至日服起每日一劑藥盡交媾也孕縱未孕經當對期百發百中百子附歸丸鮑氏方調經養血胎前産後並宜服之四物加真阿膠蘄艾葉各二兩香附赤心者去毛杵成米水醋各浸一宿曬焙十二兩用陳石榴一枚連皮搗碎東流水三升熬去滓麵糊丸桐子大空心陳米醋點沸湯下百丸單方調經只用嫩芩一兩切片以老酒浸曬三晝夜為末經來二日服五分第三日服一錢安胎丹溪論産前當清熱養血産婦因火動胎逆上作喘急者急用香附條芩為末調下條芩水中取沉者為佳墮胎乃虛氣血虛血熱黃芩乃治上中二焦藥能降火下行而安胎益母草治胎前産後諸病能行氣養血難産可煎作膏服地黃膏牛膝膏皆可服懷妊乃一臟之虛假如肝臟虛其肝氣只能生胎無餘用也不能榮其肝肝虛故受酸物産前安胎白朮黃芩為妙藥者條芩安胎聖藥也人不知以為害而不敢用或反謂濕熱之藥可養胎殊不知産前宜清熱令血循經而不妄行故能養胎胎熱將臨月以三補丸加炒香附炒白芍共蒸餅為丸服抑熱以三補丸用地黃膏丸有孕八九月必須順氣用枳殼蘇梗凡妊娠婦脈細勻易産大浮緩火氣散難産如抱船過壩一般固胎地黃五分歸身人參白芍各一錢白朮一錢五分川芎黃芩各五分陳皮一錢甘草三分黃連黃柏各少許桑上牛兒膝七葉要者每二錢入元米一撮煎服血虛不安用阿膠痛用砂仁止痛安胎行氣故也驗胎散川芎末一兩空心艾葉湯下覺微動是胎一日不動乃經滯耳別男女法沉為男浮為女左尺大為男右尺大為女至半身手心發紅為男青為女保胎丸專治屢經墮胎久不育者過七個月不必服人參二兩五錢白朮四兩黃芩當歸各二兩杜仲鹽炒酒研續斷酒浸熟地各一兩五錢陳皮香附各一兩童便浸糯米飯為丸空心白湯下七十丸保生湯治經不行似病非病六脈均而滑大惡聞食氣吐清水者名惡阻人參甘草二錢半白朮陳皮香附烏藥各五錢分作兩劑生薑煎服噁心嘔吐加丁香轉女為男法鮑氏方受孕後用絳囊盛弓弦一條系婦人左臂上垂繫腰下滿百日去之又法將斧一把置胎婦床頭仍置刃床上勿令人知如雞抱卵時置斧窠下皆雄雞也胎病十三種有胎則脾運化不利而生濕濕生痰痰生熱熱生風故諸病易作惡阻者痰也肥人多痰瘦人有熱俱宜二陳湯或茯苓補心湯子煩心驚煩悶熱也白茯苓防風麥冬黃芩子癇謂孕婦痰涎潮風也當歸川芎防風獨活茯神五加皮杏仁薏苡仁酸棗仁木香甘草羚羊角生薑煎服子懸謂心胃脹滿氣也芎歸芍人參紫蘇陳皮甘草大腹皮蔥白生薑煎服子氣三月成胎兩足面漸腫至膝喘悶妨食甚至腳趾間出黃水者濕也天仙藤紫蘇陳皮香附烏藥木香甘草生薑煎服子腫孕婦七八月面目四肢浮腫亦濕也四物加白朮茯苓甘草澤瀉條芩梔子麥冬厚朴子淋孕婦小便澀痛頻數亦熱也麥冬赤茯苓大腹皮木通甘草淡竹葉一方用車前子轉胞不得小便虛也與淋相似痛者為子淋不痛者為轉胞五苓散加阿膠七八月以後者或用冬葵子滑石山梔木通空心煎服外以冬葵子滑石梔子臼內搗膏生蔥汁調貼臍中立通七月以前不可用胎漏有胎見紅虛而有熱也歸尾南芎各五錢黃酒煎好入童便一盞臨臥服胎動六七個月或築磕損胎惡露下痛不已口噤欲臥用佛手散探之不損則痛止若損即逐下當歸六錢川芎四錢用水一碗半煎將干投酒一大碗共煎沸去渣溫服口噤灌之如人行五里再服三服便生鬼胎如抱甕者用斬鬼丹吳茱萸川芎秦艽柴胡白殭蠶煉蜜丸桐子大酒下七十丸打出惡血即愈癥瘕有似於胎用枳殼檳榔丸消散癥瘕調經進食兼養胎氣腹大謂胎間有水氣也白朮五兩茯苓四兩當歸芍藥各二兩用鯉魚一個洗淨煮汁一碗半煎前藥加陳皮少許姜七片空心服按月安胎兩三月臨動不安杜仲去皮銼薑汁炒去絲川續斷酒浸各二兩為末棗肉為丸如梧桐子每服三十丸米飲下四五月下墜小腹痛小便痛或下血當歸川芎人參各一兩棗子二枚艾一虎口酒水各二升煮至三升入阿膠一兩分二服六七月胎動不安常處旋覆花一兩厚朴白朮茯苓各三兩芍藥生薑各二兩每服一兩食前溫服忌雀肉羊肉桃李又金匱當歸飲妊娠宜常服之芎歸芍黃芩白朮五味為末酒調服或酒糊丸茶湯任下五十丸日三服孕婦風寒熱病十五方表虛六合湯孕婦傷寒中風表虛自汗頭痛項強身熱惡風脈浮而弱太陽經病宜服四物湯四兩桂枝地骨皮各七錢表實六合湯孕婦傷寒頭痛身熱無汗脈浮緊惡寒太陰經病四物湯四兩麻黃細辛各五錢風濕六合湯孕婦傷寒中風濕之氣肢節煩疼脈浮而澀頭痛太陽標病也四物湯四兩防風蒼朮制各七錢升麻六合湯傷寒下後過經不愈濕毒發斑如錦文四物湯四兩升麻連翹各七錢柴胡六合湯傷寒胸脅滿痛而脈弦少陽頭昏項強四物四兩柴胡黃芩各七錢大黃六合湯傷寒大便硬小便赤氣滿而脈沉數陽明太陽本病也四物四兩大黃五錢桃仁二十粒去皮尖麩炒人參六合湯傷寒汗下後咳嗽不止者四物四兩人參五味子各五錢厚朴六合湯傷寒汗下後虛痞脹滿或咳嗽者陽明本虛服四物四兩厚朴枳實姜炒各五錢梔子六合湯傷寒汗下後不得眠者四物四兩梔子黃芩各五錢石膏六合湯傷寒身熱大渴蒸熱而煩脈長而大者服四物四兩石膏知母各五錢茯苓六合湯傷寒小便不利太陽本病也服四物四兩茯苓澤瀉各五錢膠艾六合湯傷寒汗下後血崩不止胎氣損者服四物四兩阿膠艾葉各五錢琥珀六合湯傷寒小便赤如血太陽本病服四物四兩琥珀茯苓各五錢附子六合湯傷寒四肢拘急身涼微汗腹中痛脈沉而遲少陰病也服四物四兩附子炮去皮臍肉桂各五錢四物大黃湯傷寒蓄血不宜墮胎藥下服四物四兩生地大黃酒浸各五錢傷寒護胎法用白藥子為末雞蛋清攤貼臍下干以水濕之又方壯熱盛者用井底泥敷心下令胎不傷束胎散八個月可服黃芩炒夏一兩春秋七錢冬五錢白朮二兩不見火茯苓七錢五分不見火陳皮三兩為末粥丸服達生散九個月可服凡胎至九月不宜交合大腹三錢人參五分陳皮五分白朮一錢芍藥一錢甘草炙二分蘇莖葉五分歸身尾一錢作一服入蔥五葉黃楊樹梢頭葉七片或加枳殼砂仁以水煎食後服八九個月服十數帖甚得力夏加黃芩春加川芎氣虛加參朮氣實倍香附陳皮血虛倍當歸地黃形實倍紫蘇性急加黃連有熱加黃芩濕痰加滑石半夏食積加山楂食後易飢倍黃楊腹痛加木香桂又方九個月服黃芩一兩酒炒怯弱者減半白朮一兩枳殼炒七錢五分滑石七錢五分臨月十日前小便多者減此一味米粥丸桐子大每服五十丸空心熱湯下多則恐傷元氣氣實人宜服催生將産脈離經經者一呼三至也切莫矜張或痛或止謂之遊痛不可用力宜令人扶行直至腰腹引痛眼中如見火光乃是兒轉之候胞漿水破難以行動然後坐草切勿坐草太早恐兒在腹中難於轉側致胞先破橫生逆生至危也倘然先見手足急用細針刺手足心一二分三四刺以鹽塗之輕輕送入兒後痛驚轉乃順矣有破水後經日不産者因失於調理臨月不謹之故當詳辨之其體熱作寒面黑舌青及舌上冷子母俱死唇口俱青吐沫子母俱死面赤舌青母活子死面青舌赤口出沫母死子活遇胎衣不下者防帶一斷胞上掩心死在須臾宜兩頭縛緊剪斷以物墜住其血不入胞中胞自萎縮而下産母能寬心縱淹數日亦不害人天麻丸即益母草六月初連根採益母草陰乾為末煉蜜丸如龍眼大臨産童便溫酒或湯化下一丸能除産後百病如意散人參乳香各一錢為末辰砂五分俱研細臨産腰痛至甚時用雞子清一個調藥再用薑汁調開冷服如橫生倒産即時順子母平安又方治瀝漿胞干胎不得下用香油蜂蜜各一碗和勻銅鍋內慢火煎一二沸掠去沫調白滑石一兩攪勻頓服外以油蜜於母腹臍上下摩之黃金散治一二日難分娩者服之如神真金箔大者五片小者七片小瓷鍾盛水少許去紙入金在內以指研勻再添水至半鍾令一人扶産婦虛坐再令一人將大指按定産婦兩肩井穴溫服前藥其胎即下奪命丸治婦人小産下血過多子死腹中其人憎寒手指爪甲唇舌青黑或胎上搶心悶欲死冷汗自出或食毒物或誤食草藥動胎氣下血不止服之可安胎已死服之可下桃仁麩炒去皮赤芍官桂白茯苓牡丹皮各二分蜜丸彈子大每一丸細嚼淡醋湯下連進二丸雖胎腐爛腹中立可取出兔腦丸母丁香乳香各一錢麝香一字為極細末臘月取兔腦去皮研如泥和為丸如雞頭實大辰砂一錢為衣陰乾油紙密封每服一丸溫水送下男左女右手握其丸而下神效藥須用瓷罐盛黃臘封口單方治坐草三四日不下即刻可下蜂蜜香油好酒各一鍾合煎産婦面東服又方魚膠七寸麻油燈上燒過為末酒調服脫衣散胞衣不下滑石四錢川牛膝木通各三錢歸冬葵子枳殼各二錢又方治産母元氣虛薄者用川芎歸尾倍桂溫之自下又方用萆麻子七粒去殼研膏塗腳心胞衣下即速洗去不洗腸出卻用此膏塗頂上復縮入一方産婦自將頭髮咽咽作嘔即出附下死胎官桂三錢麝香五分俱另末溫酒調服須臾如手推下又方治橫逆不順子死腹中伏龍肝為末二錢溫酒調服其兒帶土而下又方平胃散一劑酒水各一盞煎八分入朴硝五錢再煎領出候溫胎其胎化為水下産後男弗喜女弗怒勿遽睡令閉目而坐須臾方可上床倚背仰臥立膝勿令伸足勿令熟睡常淬醋煙以防暈悶逡巡少進白粥五七日不可恃強下床一月內若傷於房事則生別症最難醫治最宜謹戒後有外感內傷雜症與男子等但宜當加理血藥為助消息之而參用焉産後發熱六種新産之脈宜虛叔和云緩滑吉實大弦急死大侵寸口焱疾不調死沉細附骨生夫産後發熱有惡露不盡者有去血過多者有傷力者有飲食者有感風寒者有感冒夾食夾氣者有三日蒸乳者俱身痛腹痛俱以理血為主不可驟用人參不可輕用芍藥不可表發不可苦寒藥惡露不盡發熱惡寒脅肋脹滿大小腹有塊作痛宜四物加五靈脂丹皮桃仁紅花延胡香附青皮乾薑官桂酒水各一鍾黑豆一撮煎八分磨木香入童便薑汁取下惡物為妙或用黑神散尤妙後以八物湯加乾薑陳皮香附童便炒調理去血過多發熱脈虛大無力內無痛者乃陰虛不足陽無所附也四物去芍藥加白朮茯苓淡滲其熱若大熱不退加黑姜神效或用芎歸調血飲亦妙傷力者同此治內傷飲食發熱頭痛有噫氣作酸惡聞食臭口中無味胸膈飽悶氣口脈緊盛宜治中湯加神麯山楂黃連炒川芎當歸佐之或理脾散亦效外感風寒脈浮而微或自汗蓋冒風也以芎芷香蘇散加羌活防風主之脈弦而懸或惡露不退是感寒也以五積散主之脈浮而緊風寒兩感以五積交加散主之有汗去麻黃加人參感冒夾食夾氣人迎氣口脈俱緊盛以行氣香蘇散主之蒸乳乳間脹硬疼痛令産母揉乳令汁通自愈或用木通通草豬蹄煎服無子者當稍用麥蘖二兩炒研細末分四服清湯調下凡産後有病先固血氣為主余疾者從末治産後雜症八種産後血暈雖有力乏血多血少三種大約虛火立血上行概用韭葉細切盛於有嘴瓶中以熱醋沃之急封瓶口以嘴塞産婦鼻可止眩暈又方使鹿角燒灰出火毒研極細末童便合好酒灌下即醒又方沒藥血竭等分名為奪命散童便好酒各半盞煎一二沸調下二錢良久再一服並治血入心經狂亂産後中風口噤乃血虛而風入夾口也若角弓反張乃體虛而風入陽經故腰背攣急也四物加秦艽羌活荊芥略炒為末每服三錢黑豆淋酒下又方當歸荊芥各一錢五分水一盞酒少許煎七分灌之下咽即效可服小續命湯産後水腫亦須大補氣血少佐蒼朮茯苓其水自利産後血崩瑞蓮一兩燒灰存性棕桐灰當歸各一兩官桂五錢檳榔二枚鯉魚鱗炒川芎各七錢為末姜酒下三錢如未止再進一服但進三服止産後不語敗血迷心也四物加辰砂紅花石菖蒲人參産後失音血侵心肺又傷風故也茯苓補心湯去陳皮枳殼川芎加升麻防風薄荷赤芍當歸生地紅花黃連膽星生薑煎服産後子宮不收荊芥穗藿香葉臭椿皮等煎湯熏洗又方治子宮痛不可忍五倍子白礬湯洗干糝亦可紅花散産後血盛血崩月事不調及遠年乾血氣乾荷葉丹皮當歸紅花蒲黃炒各等分酒調下一錢若胞衣不下以椿白皮煎湯調下五錢立效黑神散當歸熟地白芍肉桂甘草炙各一兩沉香棕灰蒲黃沒藥各五錢乳香三錢赤芍一錢血竭五分為細末每服二錢空心無灰酒送下此方可代奪命散凡敗血作患及胞衣不下皆宜服之理脾湯産後停食胸膈飽悶身發寒熱不思飲食麥芽二錢神麯厚朴薑汁炒各一錢五分蒼朮陳皮山楂桔梗各一錢黑姜八分砂仁七分甘草三分生薑煎服理中湯脾胃虛憊飲食不進嘔吐泄瀉心腹疼痛體虛有熱胎前産後白朮土炒乾薑湯泡炒黑陳皮去白神麯炒香附炒各一兩砂仁炒麥芽六錢神麯糊為丸如桐子大空心米湯服下八十丸推氣養血丸産後右脅膨脹有塊如豎弦一條著緊便疼用白米土炒青皮香油炒陳皮枳實麩炒烏藥厚朴薑汁炒乾薑炒黑白芥子炒川芎當歸酒洗白芍酒炒各一兩麥芽炒肉桂各六錢木香三錢三稜莪朮各八錢皆醋炒香附二兩童便浸炒醋糊丸如桐子大空心米湯一百丸養血佐肝丸産後脹悶一塊在左臥不著床當歸南芎半夏香油炒白朮炒白芍酒炒陳皮去白青皮去心香油炒神麯炒萊蔔子炒丹皮酒洗白茯苓紅花各一兩柴胡酒炒一錢龍膽草酒洗六錢三稜莪朮各五錢醋炒桃仁去皮尖炒八分香附二兩醋炒酒糊丸如梧桐子白湯下一百丸失笑散治小腸氣痛及婦人血氣痛欲死者五靈脂蒲黃各等分上為末每服二錢醋一合熬膏入水一盞煎一分熱服血竭膏治平血氣錦紋大黃四兩酒浸干為末好醋一升熬膏丸如彈子大熟酒化開一丸臨臥服大便行一二次紅脈自下乃調經之仙藥單方産後一切血氣腹痛天仙藤炒三兩為末每服二錢腹痛炒姜和童便酒調下患氣用酒下又方治産後敗血不止生地一兩石器內搗為末每服二錢食前熱酒調服連進三服催乳乳汁不通有血成乳脈澀而不行者有血氣虛弱而絶少者有忿怒鬱悶或厚味所釀熱甚血沸而化膿者有因乳子含乳而睡口氣焮熱致成桔核不化宜忍痛揉軟而成毒者通乳湯氣少血弱用豬蹄下節四隻通草二兩川芎一兩穿山甲十四炒黃甘草一錢用水五升煮三升一日飲之外以蔥湯頻洗乳忌風寒生冷漏蘆散氣脈壅塞用漏蘆二兩半蛇蛻十條炙栝蔞十個急火燒存性酒調一二錢仍吃熱羹助之玉露飲乳脈不行身體壯熱頭痛此涼膈壓熱下乳用川芎白芷桔梗炒各五錢甘草白茯苓各二錢半人參二錢白芍一錢半當歸一錢三分煎服如大便幼科門推散氣促攻中指夾根掐汗出少府橫紋和氣皆腹痛定吼後溪覓昏沉水瀉兼瘧疾輕搖𦙒肘調營血二便不通或瀉行陰陽分按陰膈胸痞滿欲消詳八卦運行化痰疾久掐火胥箸大陵穴能消諸熱退目赤陽池頭痛推可止腹痛尋穴按中渚喘吼無名夾指根勞宮外掐止瀉泄推拿小兒要訣心經有熱作癡迷天河推過作洪池肝經有病人多痹推動脾土病能除脾土有病食不進推動脾土效必應肺經受風咳嗽多手把肺經久按摩腎經有病小便塞推動腎水即救得大腸有病泄瀉多好把太陽著意摩命門有病元氣虧脾土太陽八為卦三焦生病多寒熱天河六腑神仙訣膀胱有病作淋疴腎水八卦運天河膽經有病口作苦只從妙法推脾土胃經有病寒氣攻涼卻肺經能去風小腸有病早來攻橫紋𦙀門推可通掐法掐驚之法起自中指甲肉盡處先掐一下以引動其血脈隨揉九九數以調和其元氣所謂先沖而後補也此名蒼龍擺尾之法次及小指食指再以口咬大拇指亦向甲肉盡處一咬一放輕重得宜亦九九數是為龍入虎口法也再以右手大指望小兒印堂推至髮際到囪門共推二十四下次以兩手大指於印堂分摩眉間至太陽太陰穴復至印堂中掐五下九下如此圖復向髮際囟門山根準頭人中地角各掐一把此法通五臟行氣血壯精神除風痰為開關祕訣百病俱用此法若瀉痢開關後仍向臍下揉百遍即止若驚風暴死取男左女右中指外一分重掐一下見哭出汗方是活症此探生死之妙訣也如欲兒汗開關後從男左女右風池掐一下太陽穴揉十餘下其汗自出多欲止從右風池掐一下即止或欲兒吐開關後用大指中指按見頰車太陰太陽穴先瀉二十四下各行單雙數目緊緊拿住待有哭聲時才放再急將兒大指甲一線之地外面重掐即吐待吐而放吐多從甲內一線掐一下即止若欲兒下開關後用手心在兒龜尾穴左轉十下氣海穴重揉三下右轉即瀉下凡治諸病如外感則汗之內傷則下之內外兩感方用吐法務要知生死之基全在活法故曰下學可以言傳上達必由心悟按摩法按以留之摩以去之掐以沖之揉以和之運則行之推則走之搓則轉之搖則動之凡小兒不拘何病父母抱之以手掌心貼兒臍下小腹往上輕輕托抱之又令一人抱其頭左右旋搖各數十能令五臟沖和百病消散其睡時亦以手按小腹功效如神三關脈訣虎口脈紋亂兒童氣不和三關參脈色百病見沉疴黃色雷轟赤煩人叫呼白疳肉奄食積紫熱嚇青多槍刺風痰怪環珠脾胃魔外彎風熱犯內曲食寒魔黑粒流珠斃紅絲內熱過風痰兼氣急紅脈感寒科黑色命關透良醫無奈何看驚歌五指梢頭冷驚來不可當若逢中指熱必定是傷寒中指獨自冷麻痘正相當男左女右手分明仔細詳看耳法耳後青筋起主瘛瘲跳躍之狀耳前後微黃主驚風入腎咬牙兩耳畔青筋橫過髮際主臍下痛吊腎氣耳後黑色侵繞者死耳瘡生者腎經熱耳後紅絲現者主出痘水紅桃紅色者佳紫色者重青黑色者死活幼黃金散治小兒一切驚風吐瀉腹脹不思飲食熱極煩躁二便結澀諸般雜症服之並效天竹黃炒五錢全蠍去頭尾瓦焙乾五錢蟬蛻去頭足三錢白蒺藜炒去刺薑黃防風甘草黃芩鬱金山梔仁炒以上各一兩蠶炒五錢牛黃一錢五分亦可以上十二味共研為極細末每服小者一匙大者加用如驚風薄荷湯下煩躁燈心同金銀煎湯下嘔吐泄瀉薑湯下腹脹不思飲食神麯麥芽湯下潮熱盛者用灶心土五錢入燈心竹葉煎湯下大便祕結大黃煎湯下小便赤澀車前竹葉燈心煎湯下大小便俱不通豬苓澤瀉煎湯下治小兒諸病方山楂四兩陳皮去白一兩枳實曲炒一兩胡黃連淨一兩青黛五錢使君子一兩蘆薈五錢人參五錢青皮五錢莪朮五錢蕪荑神麯各六錢以上為末使君子殼煎湯火米為末打糊為丸如龍核大每一丸清米湯下七味保嬰丹老火米主清胃黃土養脾炒苦竹葉去熱燈草主夜啼蘿蔔子去食積薄荷葉去驚熱麥芽和脾胃上隨症所主者多用其餘次之每服不過三錢袋盛煮湯任意渴飲或加蜜少許調理小兒丸茯苓三兩山楂肉砂仁白朮神麯黃耆白芍各一兩用山藥二兩打糊為丸香橘餅治小兒傷食腹飽嘔吐作瀉發熱口乾飲食不消胸膈不寬山楂四兩神麯六兩炒麥芽六兩炒陳皮不用片四兩砂仁四兩紫厚朴四兩薑汁炒木香四兩三稜四兩醋拌炒蓬朮四兩醋拌炒香附四兩青皮四兩醋炒甘草三兩上為末煉蜜作餅一歲一餅或二歲至五歲二餅量強弱增減用之用陳米四十粒煎湯空心化下或病勢壯實用淡薑湯下忌油膩硬物魚腥麵食如小兒瀉甚倍用牡蠣如驚跌倍用硃砂如咳嗽倍用玄明粉腹飽倍丹青忌同前琥珀珍珠散小兒有五症心肝脾肺腎是也十歲以下為疳十歲以上為癆皆因飲食不節以致吐瀉日久漸成瘦弱骨蒸內熱骨瘦如柴手足俱細肚大青筋眼花夜盲口渴釀瀉囟門頭髮俱脫落鼻孔俱紅並皆治之滑石二斤米泔水飛赤石脂十二兩米泔水飛軟石膏六兩煅石決明煅白十二個海螵蛸去殼三兩玄明粉潔白二兩青丹二兩米泔水飛牡蠣三個醋煅九次箭砂二兩五錢爐甘石四兩用銀罐內煅熟上為末雄豬肝用竹刀批開摻藥在內不落水不犯鐵器用藥五分入內以線扎好米泔水一碗煮熟空心蓮湯服盡為妙如小兒不吃湯以碗貯之飯上蒸熟亦可或摻粥飯內吃之亦可沙氏紫金錠蛇含石四兩炭火上加破鐵鍋炙紅取下置於青石上七次視內紅出為度和水研末極細水飛過煉得紅者妙青礞石一兩入銀罐內和硝火煅飛過白附子二兩明天麻二兩天竹黃嫩者一兩膽星二兩硃砂二兩麝香五錢又方加神麯山楂治五歲以上兒用糯米搗和成餅治小兒痞積急性子水紅花子大黃皮硝各一兩拌勻用白鴨一隻去毛糞勿犯水以布拭淨將藥裝入內以線縫之入砂鍋內用水三碗重重紙封煮乾將鴨翻掉黃色止冷定早晨食之日西時疾軟三日大便下血則痊矣忌冷物百日又方觀音柳煎湯露一宿五更空心飲數次腹中痞自消治小兒慢驚全蠍一個殭蠶三條青蒿蟲七枚硃砂硼砂各一分研細用人乳和勻送下治小兒急驚搐搦欲死麝香一分丁香七粒胡椒三十五粒為末用豬板油少許為丸入臍中上用濕草紙三層以熱磚尉紙上自愈治小兒驚風吐瀉宜服五苓散以瀉丙火滲濕土內有肉桂能抑肝風而扶脾土加減柴苓湯治小兒瘧和解表裡分理陰陽柴胡半夏黃芩茯苓白朮青皮當歸知母以上各等分暑渴加石膏麥冬寒盛加桂枝乾薑痰盛加前胡檳榔食積加草果麥芽虛弱加人參蓮肉渴盛加知母頭痛加川芎白芷汗多加防風桂枝加減芍藥湯治小兒赤白痢當歸芍藥陳皮枳殼黃連木香乾薑炒黑甘草以上各等分如赤痢加紅曲黃芩白痢加滑石炒肉桂少許食積加麥芽山楂砂仁水瀉痢加豬苓澤瀉茯苓蒼朮血黑加桃仁紅花山楂赤白痢加玄胡索調中湯治小兒瘧痢齊行柴胡半夏黃芩白朮茯苓枳殼木香陳皮青皮甘草草果以上各等分如渴加石膏生薑水煎赤痢加當歸紅曲桃仁白痢加滑石斷痢散治小兒赤白滯下並水瀉車前子炒香為末每服一二錢米飲下即止青六一散治小兒赤白痢滑石六錢甘草一錢青黛一錢為末每服一二錢溫水下石蓮飲治小兒噤口痢石蓮肉炒淮山藥各等分為末每服一錢米飲下治小兒瀉痢後脫肛用槐花末一二錢陳米湯下三仙保命丹治小兒疳積穀精草研末八分蛤蜊殼研末三錢二分石燕研末二錢共和一處每用二錢將豬肝二兩用竹刀刳碎將末藥摻在肝上用酒煮熟去藥吃肝重者五六服酒送下治蟲積辰砂二錢明者佳石決明四錢須眼多者二味為末用一錢入豬肝內筍箬包好黃仙草扎稻米泔水煮食之忌鐵器神效走馬牙根腐爛驗方用溺桶中白垢火煅一錢入銅緑三分麝香一分半吹之即愈又方用牡蠣三兩火煅紅醋淬七次冰片二分共為細末吹之即愈病原論夫小兒者幼科也初生者曰嬰兒三歲者曰小兒十歲者曰童子兒有大小之不同病有淺深之各異形聲色脈之際望聞問切之間若能詳究於斯可謂巧工者矣蓋望者鑑貌辨其色也假如面部左腮屬肝右腮屬肺額屬心鼻屬脾頦屬腎肝病則面青肺病則面白心病則面赤治疒貢𤺪頭方廁內久浸瓦片洗淨曬露七日夜不可見雨研末敷之中留小孔即愈一方加蒸過饅頭荷葉又方紫口蛤蜊殼燒為末香油敷又方枳殼半個去穰合上面封之干則用水濕開再換膿完即好一切硬毒俱治又方蛇殼一片唾濕貼瘡即出膿愈一方用小麥治暑月頭上生癤槿樹花敷之又方用鬼饅頭白汁點之治抱頭火並貼骨火方芝麻萁燒過存性為末入銀硃少許醋調敷治流漿泡及抱頭火赤遊丹並一切熱毒川大黃蚯蚓糞黃柏側柏葉等分並炒雞子清調敷效治赤遊丹半歲內因濕生熱初起一二點紅走動遍身從頭手起者至心死從足起者至腎死急則將線扎住用瓷鋒從兩頭刺出血嚼浮萍敷之緩則將薑汁蔥汁燒鹽煎湯洗之湯勿令入眼再服後藥白芍陳皮黃芩各五分藿香木通各四分煎服又方蔥白蜂蜜搗敷雲頭處又方赤小豆粉醋調敷又方瓦松搗敷又方大黃巴蕉根搗敷又方用生豬肉貼之又方治一切火毒用雞子清調伏龍肝敷治蛛絲丹韭地蚯蚓糞微炒研末摻之如干用香油調搽又方用醋磨鐵鏽搽之治重舌巴豆半粒飯黏五粒研餅如豆大貼眉心待四圍起泡去之又歌曰小兒重舌最難熬鏽鎖將來火內燒打落屑兒為細末水調吃下即時消治口中諸病不能吮乳及喉腫黃連黃柏各八分辰砂青黛雄黃各二分朴硝一分半硼砂片腦牛黃各一分研末取少許搽口內愈治一切無名腫毒濕爛大人亦效蚯蚓糞三兩熟皮硝二兩研末汲水濃調厚敷治肥瘡黃水瘡紅棗燒灰枯礬黃丹松香各一錢官粉五分銀珠三分濕則摻之干則用香油搽一方用豬爪灰即豬蹄鞋燒灰濕則摻上干則用麻油調摻治禿瘡並頑癬桃頭七個長四寸搗烏梅七個白礬川椒胡椒各一錢香油二兩熬至一兩晨起搽之一方用雞子油又方黃丹豆腐渣厚敷之數日而愈又方臘肉骨燒灰香油搽又方陳小麥半升炒時陸續下硫黃二兩為面每兩下蜈蚣三條再研先將蔥椒洗淨麻油調敷三次即愈剃髮再搽三次永不再發治身上痱子癢冬瓜皮摩之即愈冬月用藤煎湯洗之治瘡疥癢金銀花苦參荊芥甘菊防風各五錢煎好入皮硝一兩洗之五福化毒丹治一切胎毒上攻口舌生瘡重舌木舌馬牙鵝口及遍身瘡癤赤遊驚咽疳癰腫等證桔梗去蘆皮微炒玄參去蘆洗焙各六兩白茯苓去皮五兩牙硝人參青黛各二兩甘草去皮炒一兩半麝香五分煉蜜丸如芡實每服一丸蜜調化下治夜啼蟬蛻七個取下半截為末薄荷湯入酒少許調下一字如不信服上半截則復啼又方治有邪熱焦躁夜啼取上吮之或用燈心燒灰亦可治盜汗胡黃連柴胡等分為末煉蜜丸如芡實大一丸至三丸用酒化開加水五分重湯煮二三十沸食後連渣服外用五倍子末納臍中治斷臍不如法臍內血出殭蠶炒去絲為末蜜調敷瘡口治小兒出尿烏藥為末米湯下三錢又方燕窩草燒灰水調服治大便不通方幼弱不可下者用之蜜三兩熬如飴加牙皂末三錢捻作挺子三四條將一條納穀道中如未通再易一條必通矣萬億丸能治小兒百病方見普濟治嗽方甜梨一個切開入蜜於內麵裹煨吃之又治久嗽方南星半夏白礬生牙皂杏仁去殼研巴豆去殼研棗肉丸如梧子用三五丸針挑燈上燒存性茶清下余兒克大時年十三咳嗽發熱痰中見紅諸醫不效服此方即愈抱龍丸壯實者宜服治傷風發熱痰壅潮搐瘟疫中暑等症膽南星八錢麝香一錢天竺黃雄黃辰砂各四分甘草膏臘雪煎尤佳為丸如皂子大百日分三次服白朮散治吐瀉後作渴將成慢驚者人參白茯苓去皮白朮藿香乾葛炙甘草木香等分煎服若瀉痢頻數將成驚加山藥白扁豆肉豆蔻煨各一錢用姜一片煎若慢驚已作加細辛天麻各一錢白附子八分全蠍三個若冬月小兒吐多胃寒加丁香二粒胃虛不能食大渴不止加天花粉能食而渴者乃用白虎湯加人參肥兒丸磨癖清熱進食殺蟲人參白朮黃連薑汁炒神麯麥芽楂肉各七錢白茯苓甘草炙各六錢使君子肉九錢胡黃連一兩蘆薈五錢碗盛泥封固置土坑內四面糠火煨透用之黃米糊為丸每服二三十丸量兒大小加減家傳肥兒方山藥二兩飯上蒸五穀蟲瓦上焙茯苓去皮白扁豆炒楂肉炒芍藥酒炒麥芽粉神麯炒當歸土炒各一兩半陳皮炒使君子肉各一兩甘草七錢黃連薑汁炒飯上蒸七次煉蜜丸如元眼大空心燈心湯化下治臍風撮口只用田螺三個入麝香搗爛搽臍小兒水瀉脾虛飲食不化半夏七分湯泡七次白朮二錢河水浸半日焙丁香五分微炒共為細末用生薑自然汁糊為丸如桐子大十歲以上者二十丸年幼減至五六丸新起者一服即止年久者二三服愈一方白朮土炒白茯苓各等分同陳米一撮煮粥只吃米湯即下一方將糞蛆新瓦焙乾炙為末每服三錢沙糖食效治赤遊丹將蔥白蜂蜜同搗爛敷雲頭處愈又小兒如被蚯蚓傷小便者以鹽湯洗數次愈小兒遺溺雄雞肝桂心各等分同搗爛如泥小豆大每服十粒酒下日三服治諸物食積作痛大人小兒俱可服白朮一兩茯苓一兩蘿蔔子另蒸入藥二錢山楂肉一兩五錢法制半夏一兩陳皮五錢共為末煉蜜為丸如彈子大空心棗湯下一丸痘科門小兒痘疹科辨論訣辨病識疹痘疹初發似傷寒憎寒壯熱體疼酸耳尖鼻尖骫骨冷耳後紅脈臉赤看眼澀生眵腹或痛鼻鳴氣急口生痰脈弦大數身戰動大便黃稠煩渴譫痘疹日數痘疹欲出身熱初熱不狂兮痘必疏一二三日微微出出者須明畏隱無四五六日當起發光明紅滿根紅活七八九日漿漸臨瘡膿成熟色蒼蠟十一二日靨離離瘡痂漸落不須醫有一乖違即不中急將藥力與扶持不須服藥痘疹不拘多與少顆顆根紅方是好明光滑澤似珠圓不用求醫不用禱痘疹宜忌房衣宜潔更宜密身宜常溫更宜熱最忌飲冷及沖寒臭穢腥臊如仇隙痘疹輕重輕者須分三次出根紅大小不等一頭面稀少眼中無光明肥滑表裡實一齊出者名為重灰白稠多似蠶種倒靨洋塌七孔有寒戰咬牙可驚恐頭溫足冷渴瀉頻氣喘身溫腹脹腫痘疹五不治癢塌憎寒戰不止咬牙氣促煩渴利喘息不寧紫黑色頭溫足冷悶飲水腹脹喘咳灰白陷五者看來皆不治治痘大略痘門無表無下理解熱和中安表耳虛則益之實則損溫涼平熱而已矣隨症用藥痘瘡未出初發熱耳尖鼻尖冷如鐵便宜用藥發散之升葛楂黏甘草節痘瘡將出絲瓜好近蒂連皮三寸燒或入箭頭砂少許沙糖調服毒潛消痘疹初出適害眼腦囟頭髮須宜剪鼠黏為末蜜調塗盲瞎自能從此免痘瘡出不快四聖方書載紫草與炙甘木通枳殼配水煎二三錢脺面還盎背或加黃耆尤妙焉化毒湯須紫草茸升麻炙草輕重同痘瘡已出出不透半合香粳米也水煮濃白芍藥炒為末每服一錢散名活血瘡出不快用酒調腹若疼兮溫水啜痰涎鬱滯因氣實致使痘瘡發不出升防歸芍與黃芩連翹白芷同蒼朮痘瘡已發三七朝不紅兮活不起發透肌解毒散有功甘草歸防陳赤芍初出胸前瘡太密藥須解毒為最急楂黏甘節紫耆參酒炒芩連及荊柏痘瘡色黑為血熱藥與胸前太密同惟是山楂不須用更加升芍與防風痘瘡發白氣應虛芩術芎歸與耆升葛木香同作劑若加訶蔻瀉為宜瘡中黑陷外白起黑宜涼血白補氣醫者何法以治之相兼而治斯為美瘡幸將成色淡兮紅花酒芍與芎歸紫宜解毒並涼血芩與升連翹葛隨痘疹如太甚人參敗毒散急宜進人參桔梗甘草川芎茯苓枳殼羌活獨活前胡柴胡犀角地黃湯亦佳生犀角赤芍藥牡丹皮生地黃熱甚加黃芩二藥任君斟酌飲胃虛吐利逆冷手足瘡發多癢或出不足散為木香功效神速香分丁木皮用青腹參半桂心訶前甘茯姜水同煎食前溫服異攻散功更奇木丁半附朴陳皮參苓桂術當歸等肉果生薑大棗宜黑陷倒靨與灰白痘瘡此是惡消息人貓豬犬臘辰灰一服三分調以蜜或用穿山甲嘴上鱗三五片燒灰研末當歸酒調下尤妙此名無價散外傷惡氣致倒靨甘草黃耆火胥用梢更有參歸芎與芍木香白芷共連翹痘瘡宜愈久不愈膿血淋漓為誰語多年茅屋爛草柴焙末敷之何所慮百祥丸用紅牙戟瘡黑陷甚煮去骨曬乾復煮煮復曬務盡初時所煮汁臨干丸如粟米粗每服可用二十粒更研赤芝麻作湯吐利亦同此湯吃灰黑頂陷十死七內有斑丁人不識要識其中大者是四聖靈丹真妙術豌豆燒灰用七七珍珠研搗三五粒發灰胭脂調作膏撥以銀簪點之吉痘瘡已愈眼生翳十兩穀精蛤粉倍黑豆用皮稱三錢火胥用生研勿火焙豬肝作片再批開摻藥其中緊縛系砂罐煮乾令食之免使他年眇而睇瘡既收兮喜不禁渾身壯熱復憂心門冬龍膽柴胡共甘草玄胡與楝參鼠黏十倍須令炒射干升麻炙甘草口舌生瘡喉腫痛大便堅實服之好痘瘡收後毒歸心為致心脾痛不禁芍藥當歸並乳沒水煎溫服毒難侵一切瘡餘毒雙親急問醫鼠黏蟬蛻等荊草芍防歸治蟲痘方絲瓜葉汁噙噴痘上以柳葉鋪床臥之若皮厚不出以銀針挑破滴香油入內即出用花椒湯洗之治痘不起韭菜根煎湯服外用乳香檀香沉香薰之救急方臘月收人豬貓犬糞燒灰為末遇危急者蜜調服之百無一死移瘡法喉間緊閉用巴豆篦麻子各一粒加黃丹少許研餅貼眉心一夜即開若貼起泡用石菖蒲水洗之痘出眼中方百日內猶可治石青黃丹各一錢輕粉五分用二三釐右眼吹左耳左眼吹右耳其翳自落又方用桑葉蒂白漿滴在田螺肉內螺即放水瓷鍾盛之將羊毛筆洗淨蘸水點之即去若冬月時先將針挑壁蟢水點之翳即不大至春月仍用桑葉又方橄欖核磨水入輕粉一二釐搽眼胞上勿令入目祕傳萬應稀痘飲新拋羊屎一粒黑赤緑豆各二十一粒甘草節二分燈心二十七段長一寸六安茶一錢珍珠一分銀簪一根洗淨水二鍾煎作茶飲之此藥當痘行之時預服即不出如身熱服之必稀稀痘單方臍帶初落即用米泔洗淨焙為末每一分入硃砂甘草湯飛過三釐搽乳上以一晝夜吃盡為妙一方用生地當歸煎調納兒上齶取下惡物不惟稀痘並無驚風諸疾又方用經霜楝樹子四十九粒每於晦日洗浴一方用烏魚又方發熱時即用金銀花一兩防風一錢黑沙糖調下三錢又方用烏骨雞子一個開一小孔納白頭蚯蚓一條紙糊飯上蒸熟去蚓食之經年不出或聞鄰家出痘服之亦能稀痘或竟不出又方用絲瓜近蒂三寸炒灰存性沙糖調服一方用子治痘瘡遍身濕爛取舊屋茅曬乾為末摻之一方用出窯新瓦為末名振陶散亦妙治痘生眼中剌蝙蝠血滴入治眼合久不開用真濟寧油煙脂敷眼縫即開治痘毒用糟茄皮貼之硬即軟潰即消又方緑豆粉雞子清調敷外科附録漏蘆湯治諸癰疽疔腫無論是陰是陽未破之毒兼初潰紅腫尚未盡消及濕爛疥瘡等症漏蘆二錢五分紫花地丁荊芥當歸酒洗連翹薄荷白芷升麻各一錢麻黃三錢大黃二錢生甘草四分水二鍾煎八分食遠服蓋衣取汗渣再煎溫服第二日諸藥同前麻黃一錢大黃二錢五分甘草六分照前煎溫服第三日諸藥同前麻黃大黃甘草各一錢照前煎溫服凡患大毒腠理祕固此宜於三味加減緩緩而疏表之其紅腫未盡照第三日之方再服一二帖無礙如不欲表麻黃少用或不用亦可如大便不實大黃少用或不用亦可此藥欲汗則蓋衣熱服不欲汗不蓋溫服如上部加桔梗頭上加川芎面上加蔓荊子酒水各半煎臨睡服中部照本方不加下部加牛膝空心服北方人生便毒服利藥正氣受傷皮厚不穿不念人已狼狽服此藥救之一汗後不砭自穿貼白黑二膏而痊神燈照熏藥雄黃硃砂血竭沒藥各二錢麝香四分上五味求極真者研細末綿紙裁為條長尺許闊四指每條用藥三分捲成捻以真麻油蘸透扶病起坐或側身臥定點著藥捻對患處離半寸許自毒之紅暈外照起而內周圍徐徐旋轉旋至中央更須將捻猛力向外一提藥氣從燈頭漸漸而入毒氣從火頭上一提而出其燈必滅篦去燈煤再點再照視毒之大小用捻之多寡或三五根或八九根以意酌量用之照至三根腫處覺得寬暢照至五六根腫皮即皺痛隨減漏蘆湯或前後進之得微汗痛人自覺爽矣照後勿信人言敷貼別藥過半日此藥既盡疼痛稍作仍前照一次日日如此照二三日其毒麻木不疼自初發照起照至腫平色白內消而止毒盛不能內消者日夜煎藥一貼照熏兩次則以已成之毒盡化為膿不砭自穿貼後二膏陽毒有椒眼數十照久脫落如蜂窩狀一頭或如爛肺條條片片或如粉糊或紫血水惡肉腐盡新肉漸生如榴子不用生肌散而口自合矣如陰毒外皮不爛毒肉內化稠膿當頭自破二膏日換一次肉滿而止臘礬丸治初腫及內消已成之毒能護心固膜實臟腑止痛化死肌催毒安速穿逐敗膿生新肉外科中始終該服之聖劑也凡患癰疽之證先失其治致毒氣上攻心包絡而嘔逆作又有陰疽庸醫誤投涼藥而嘔逆者急服是藥以救之日二三服不應則危已哉黃蠟二兩分為五分明礬三兩研末分為五分先以明礬分置瓷碗中將黃蠟一分入杓內化開投礬末中乘熱捏成團近火邊烤丸如梧子大丸畢再將礬蠟連照化投丸之每服二三十丸溫酒送或米飲清湯皆可送上部食後服中部食遠服下部空心服日一服或二三服白玉膏凡潰後之瘡即將此膏塗於太乙膏中貼之倘陽癰大潰死皮卷籠貼久自化不勞刀鉤日換一次貼肉條條片片而落新肉纍纍而生膿盡肉平口合矣白蠟黃蠟各五錢鉛粉一兩龍骨海螵蛸象牙焙鳳凰蛻焙雞內金焙蝸牛焙輕粉乳香枯沒藥枯以上各一錢共研為末白粉霜一錢另研如無紅粉霜代之水銀一錢樟腦四錢研先將鮮豬板油熬淨二兩鍋內熔化次投黃白蠟化再投鉛粉再投九味細藥攪冷將凝方入水銀粉霜樟腦急攪冷定埋土出火毒花椒蔥槐條煎湯洗過貼之太乙膏大生地玄參白芷當歸赤芍肉桂香辣者各五錢真芝麻油一斤浸上藥春秋五日夏三冬七日急用不浸亦可入鍋熬黑去渣加飛過黃丹八兩收熬至滴水成珠傾冷水中二三次攤膏罩白玉膏貼之瘡收口後新肉微突貼久自平護之為佳戒煎煿發物雞魚牛肉螄螺羊肉及心肺腸肝糟筍麵筋黃瓜韭蔥姜椒辛辣之物緑豆豆芽酒色氣惱烙餅煎炙及穢惡之人行經婦女陰臭口臭之人生粉瓜果硬冷難化厚味生冷冷水等物惟宜淡糕白老米粥飯不可太飽又不可太飢茶飯粥食宜少而頻餘論凡遇顯症內以漏蘆湯次第表之外用神燈以火引火使毒內外分消不半日而凶證隨減輕者自平重者依方再服再照始終進蠟礬丸護心固膜止痛排膿貼白玉膏太乙膏去腐生新肉平口合萬法歸一真神方也臟腑積毒癰疽作助胃壯氣為內托佐以行經活血宜更參時令並經絡太陽經分腦頂背癰發黃連消毒最二防二活甘桔兼當歸六黃生熟地芩連耆柏生熟地又治盜汗參翹知澤與陳皮蘇木蒿本同為劑尻臀生癰是太陽宜用內托羌活湯黃耆酒柏當歸尾防蒿翹陳甘桂蒼臂癰經屬陽明分白芷升麻湯可飲生芩酒芩經桔甘酒耆倍入同良醞瘡生腿內近膝股此是太陽厥陰部耆柴翹桂土瓜根生地柏羌防尾伍腿之外側少陽是微侵陽明痛難履炙甘耆柏桂柴翹歸尾升麻大力子肺癰枳桔配黃耆薏苡栝蔞貝母歸防已杏仁甘草節又加百合與桑皮口吐膿血似肺癰更兼口臭口能容發灰量入消風散米飲濃調服數鍾乳癰乳硬用青皮甘節蔞翹芎主之未潰刺桃並橘葉潰加參芍與歸耆蒲公英忍冬藤酒水各一升乳癰並惡腫試效古今稱腹痛脈滑數無力此是腸癰病應的可服雲母膏一兩雲母膏方蜀椒去目微炒白芷赤芍肉桂當歸菖蒲黃耆白芨芎藭黃芩夜合皮附子良薑茯苓各五錢甘草四兩桑皮柏葉槐枝柳枝各二兩木香龍膽白蘞防風厚朴桔梗柴胡松脂人參蒼朮陳皮細銼各五錢入清油四十兩浸七日文武火煎以柳篦不住手攪匝沸下火沸定又上火如此三次以藥老黃色為度去渣再熬後入黃丹十四兩沒藥鹽花麒麟竭麝香乳香各五錢螵蛸雲母各四兩不住手攪將凝又熬滴水成珠為度瓷器收貯候溫將水銀二兩以手細彈鋪上用時先刮去水銀或服或貼能治一切瘡腫傷折等病外以牛膠酒溶化液癰疽入囊者濕熱流肝經更以補陰佐臨危亦可生囊癰腫而裂托以桴炭木既托又何如包以紫蘇葉紫花射干治便毒請君尋三寸足生薑食前煎而服得利數行任趨躅牽牛牛蒡子酒煨大黃破故紙便毒用等分酒調一兩餌若治便毒膿已結丹溪妙法為君說大黃連翹各三錢二錢厚朴甘草節三七桃仁三片姜三錢枳實分三帖玉莖皮塌長而腫小柴胡里黃連用若還兩脅氣上衝少加黃柏瀉火攻莖中堅硬服青皮散風之藥佐之宜更將何藥敷其內絲瓜子汁調五倍男子下疳奚生薑酒水煎服腦癰發背去木通發背誤服涼藥食少困頓肌肉不生去木通少用當歸倍厚朴陳皮流注加獨活打破傷折在頭去木通加川芎陳皮經年腰痛加萆薢酒煎再加玄胡索腳氣加檳榔木通穿山甲堅硬不穿加穿山甲獨活麻黃黃連須加蔥無膿或薄血清水或膿如乳汁肉如破絮或胬肉突出及一切痰飲為患並加南星半夏連翹敗毒散治癰疽發背疔瘡一切無名腫毒憎寒壯熱二日至四五日者連翹金銀花柴胡防風羌活獨活前胡荊芥枳殼桔梗茯苓川芎薄荷甘草姜煎熱服如熱甚痛甚加芩連如大便閉加黃硝真人活命飲治服敗毒散未消至六七日者天花粉甘草節乳香白芷赤芍貝母各二錢沒藥歸尾酒洗一錢防風八分皂角刺五分穿山甲三大片切蛤粉炒酒一碗半紙封勿令泄氣慢火煎至一碗能飲者服後再飲三五杯側臥覺痛稍定則生背加皂角刺腹加白芷胸加瓜蔞仁四肢倍金銀花沃雪湯治腹內生癰疽及一切毒亦即真人活命飲去防風用歸身白芍加黃耆連翹射干青皮木香甚者加大黃內消散治腸癰便毒及一切毒使血從大便內下即真人活命飲去貝母防風陳皮加大黃木鱉殭蠶栝蔞仁各一錢托裡消毒散與瘰癧通看治癰疽將潰者能固脾胃使毒氣不內攻金銀花陳皮各三錢天花粉黃耆生各二錢防風當歸酒洗川芎白芷桔梗厚朴姜炒穿山甲炙皂角刺炒各一錢酒水各一盞煎服已潰而虛者去陳皮花粉山甲角刺加人參薄桂甘草益氣養榮湯益氣養榮湯方詳瘰癧凡病勢緩而人不足者宜先服之代刀方有膿不穿者用晚蠶繭出空者一枚燒研酒下一方加指甲於繭內更妙外用雄雀糞一粒唾黏於軟處退管方蟹殼一個鱉頭骨一個俱瓦上焙研煉蜜丸如桐子每日空心酒下二丸能不間斷管自退出去爛肉方巴豆炒煙起焦黑為度研敷能去舊生新生肌散硼砂主藥沒藥各二錢乳香兒茶血竭赤石脂海螵蛸水銀黑鉛龜版炒鱉甲炒各一錢輕粉三分作癢加白芷併為末將鉛煎化入藥末研極細摻瘡一方加象皮白螺殼一方加螵蛸龍骨一方用上四味加黃連黃柏輕粉一方用上五味各三分加冰片珍珠各一分摻之又方白死竹無人見處佳蘸菜油燒之取滴下油搽生肉神效又方黃柏為末入雄豬膽內二次妙又方烏梅燒灰存性敷之生肌止痛膏香油二兩黃蠟一兩同化寒水石煅一兩黃丹一錢紙攤貼之又方治凸出胬肉烏梅搗爛加蜜攤貼效治面項浮腫生毒用狗尿塗之愈治痄腮一名蝦蟆瘟乾葛柴胡紫蘇黃芩連翹玄參桔梗金銀花防風薄荷天花粉甘草等分煎服又方大黃牡蠣殭蠶牛蒡子等分為末噙化又方田螺肉和飛面搗醋敷如干以醋潤之一日夜愈又方青靛花敷治氣頸海帶昆布黃芩各一兩並酒炒豬眼肉二十一個瓦上焙為末五更酒下一錢半或酒糊為丸亦可忌茶緑豆及生冷治喉鵝壁錢七個明礬七釐油頭髮三根縛壁錢於銀簪上燒存性初起吹之即消如無即用白礬吹又方薄荷一兩山豆根五錢青黛二錢硼砂兒茶各一錢五分加冰片吹又方治皮厚有膿而不出者雄雞肫肝內黃皮陰乾為末吹之即破又方蛇蛻煅吹之治對口茄蒂七個何首烏五錢酒煎露一宿空心服取微汗不過三服又方豬眼稍臭脂屠戶必挖去者即此物也陳糟搗敷忌鐵器加膏藥貼住一日一換又方甜菜葉加鹽搗敷又方雄黃人中白雄蜒蝣背上有白紋者是二條搗爛敷之又方蕎麥麵要新磨者水調作圈圍瘡將肥大雄雞就圈滴血注滿一周時效又方蚶肉研敷又方天茄莖葉子俱用即白牽牛生薑三片同搗早晚換三日愈治發背初起金銀花五兩生甘草節五錢河水井水各五碗砂鍋煎至五碗入酒一碗分三次一日內服完並治一切毒又方金墨磨濃於暈外畫圈雄豬膽汁薑汁等分於圈內時時塗之留頂出毒氣三日後出干膿而愈又方蓮房燒存性蓋土地一夜桐油調敷治發背已成冷陷者難治茅根一兩當歸連翹白朮金銀花各五錢芭蕉根二錢皂刺半夏薑黃各二錢黃耆一錢五分甘草生一錢水五碗煎三碗分三次服又方蛇頭草一名婆婆針線包子內有似楊花者水濃煎入陳酒半盅服取汗如有鮮者渣敷尤妙又方鉛粉三兩血竭硃砂各一兩銀硃五錢乳汁調敷外用豬腰子竹刀切片貼上待貼上待臭黑去之如煎敷貼至不臭不黑而止並治疔瘡惡毒又方蚓糞煅白螺殼煅蜂房炒水龍骨煅蜜調敷又方治潰爛者用螞蝗收毒然而危矣治搭手大蜂房入香油點滴患處即愈又方獨蒜板艾灸之治疔初起時用核桃殼半個盛溏雞屎合瘡上外用艾灸至痛效又方硃砂一兩雄黃五錢麝香三分並研用火酒少許化蟾酥二錢和勻入瓶臨時水調搽頂撥出紫血愈又端午日收豨蘞草為末酒下又方槐花末酒下五七錢又方蒼耳草枸杞根菊花葉搗汁白者佳和湯服渣敷又方荔枝肉十枚霜梅十個銀硃五錢溏雞屎調敷重者加蜒蚰十條又方蜒蝣一條烏梅肉一個搗敷留頂如覺痛以冷水拭周圍少時覺熱而愈又方治面上水疔浮麥燒存性燈盤下油調搽又方治嘴上疔雄黃一分和露天鐵繡食鹽各少許用刀挑開上藥揉進再摻在膏藥上貼之總之菊花搗汁一升春苗冬根服之雖危亦救渣加蝸牛搗貼治手指生蛇頭雄豬膽套住一日一換又方雄黃一錢乳香五分蜈蚣一條為末雞蛋去清留黃入藥六分和勻套指一日即消又方醬茄去蒂套指治𨁹心毒桐油垢久住瓶上刮下作丸清菜湯下十丸吐出血塊血膿自愈溫糊粥調理須要忌口治乳癰初起蚶殼五個燒熱酒沖服又方加皂角灰又方用蓮房灰三錢又方用樺皮灰三錢又方用貝母白芷等分研末酒下三四錢又方瑞香腦頭七個男子頭垢為丸七粒生白酒煮瑞花香送下如無以菊花代之一方菊花頭搗敷治乳癰治乳方多惟此神效並治一切癰疽瘰癧栝蔞大者二個搗當歸酒洗甘草各五錢沒藥乳香各一錢研分二劑酒煎分三次飲以渣敷乳治乳癰潰爛竹葉灰摻之又方貓毛用頭腹下者燒存性輕粉少許香油調塗治河白榆樹根皮三斤切煎湯洗浴隨用香油一盅麝香一分調塗虛腫處以手擠之有稠痰應手而出即愈治遍身結核金銀花藤菖蒲根搗汁塗之又方生薑白芥子搗和飛面敷治脅下毒生地榆搗汁和酒熱服治陰子腫大如水晶陰汗潮濕內服治濕湯灶心土三升研砂鍋炒極熱加川椒茴香於面置陰囊在上冷則再炒如此三次即愈治男子陰頭癰皂角不蛀者燒存性酒下又方皂角炒陳小粉炒等分熱醋調貼干則以水潤之又方鱉甲炙脆研末雞子清敷治陰子爛出先用紫蘇湯洗杉木灰紫蘇葉等分為末敷仍以紫蘇包之一方用野紫蘇面青背紫者又方鳳仙花甘草為末下用艾揉熟托之治脫肛五倍子八個川椒二十粒蔥二根用青米泔煎洗又方治腸出者薑汁和蜜潤之即收治臟毒百草霜一兩烏梅十個去核搗丸米飲下二三錢又方用豬胰子半斤好酒半碗燉熟空心服之治偷糞鼠槐角枳殼各三錢黃芩生地各二錢黃連一錢五分穿山甲炒蒲黃殭蠶各一錢作二帖煎服如大便不通加大黃二錢煎一滾即服忌口治鶴膝風先用紫蘇湯洗當歸白芍熟地陳皮白朮茯苓知母牛膝木瓜等分酒水煎服又方古銅錢火煅醋淬大楓子肉各五分用核桃肉十二個徐徐嚼咽兩次效又方全蠍七個核桃劈開去肉入蠍草紙裹之苧麻密扎炭火漫炙候煙淨取蠍為末米酒送下再儘量為度三服效又方膽星半夏山梔仁飛面滾酒調敷至不黑不痛而止又方薑蔥搗敷以帛裹定覺熱即愈重者二次又方用尿半桶入甕內燒滾熏洗三四次即可走治重腿粗腫豆腐渣一斤板豬油四兩搗敷有臭水出即消治諸漏鳳凰衣燒灰生桐油調塞入眼漏內治火丹馬齒莧醬板草搗汁酒下其渣加鹽少許敷之又方寒水石飛丹豬膽汁敷又方黃柏去粗皮膽汁浸曬為末柏油調敷又方用頭油繩扎住新汲水加白礬頻拭之黑丹面上身上生黑點如疥者若遍身即難治鹿角燒灰豬油調搽遊腫又名五色丹敗蒲席燒灰雞子清搽一方用赤小豆治瘌痢詳幼科先將米泔洗淨次用牛骨髓搽之又方苦楝根皮燒存性研豬脂塗並治諸瘡又方鯽魚一個不去腸鱗開孔塞入亂髮鹽泥封煅干則加豬油塗又方鹽滷香油各半鍾銀耳搗調至如糊剝去瘡痂敷之十日即愈又方蔥椒末和麵豬油調做如僧帽覆之以布扎住待冷烘熱再覆又方以飯湯洗去痂搗蒜敷之用和尚帽罩住治頭面生瘡有水流到即成瘡者松香四錢飛丹二錢銀硃一錢帶根蔥搗汁和藥煎乾焙為末菜油搽並治熱癤點痣方糯米一撮鹽水浸七日如泥用針微刺破點之三四次即愈治面上紫塊大如錢小如豆者穿山甲十片炒生薑野大黃各四兩取汁生絹包藥蘸汁擦患處如干加醋三四次效治面上生肺風瘡及皮膚癢麥冬去心一斤橘紅四兩熬膏入蜜二兩再熬成珠浸水中一夜滾水化下二三錢又方苦參五錢煎湯入皮硝一兩牙硝五錢熏洗又方皂角去皮三片白芨白芷天花粉各一兩甘松山奈藿香白丁香臘月收各五錢樟腦一錢升麻半斤楮實子五兩緑豆一兩砂仁五錢糯米一升煉蜜丸如彈子洗面最妙或散用亦可一方用牙皂一兩無升麻以下五味加木澤細辛杏仁密陀僧各五錢白茯苓八錢為末乳汁調敷清晨洗去治雀斑櫻桃枝霜梅肉紫背萍牙皂等分為末如常洗面治面上風癬先用苦參湯洗白芷三錢黃連黃丹各二錢白茯苓一錢五分輕粉五分香油調搽一方加竹節白附子治面風之遊走治口瘡牙疳見幼科芩連梔柏加細辛乾薑等分為末先用米泔水漱口後搽神效治口吻瘡檳榔燒灰敷之又方發灰絮灰黃連研末敷之又方治唇裂橄欖去核燒存性豬油調敷治羊鬚瘡小紅棗燒灰清油調敷治凍瘡癢痛蟹殼燒研菜油敷又方酒化鹿角膠搽又方雀腦或兔腦搽治漆瘡死蟹水置甕內作爛塗之又方貫衆為末香油調塗瘡上治抓破面皮薑汁調輕粉塗之便無痕跡手搔傷成瘡先用花椒湯洗牙皂枯礬黃連黃柏輕粉等分研末敷之又方石膏輕粉等分痛加乳香沒藥治瘰癧瘡名益氣養榮湯黃耆蜜炙人參白朮炒各一錢五分當歸酒洗川芎白芍酒炒生地陳皮香附貝母各二錢柴胡地骨皮桔梗炒甘草炙各五分吐痰加橘紅刺痛加青皮木香午後熱頭微眩加黃柏酒炒膿水清倍參耆歸女人有郁倍香附貝母月經不調加丹皮當歸先服十劑後用硃砂血竭各一錢斑蝥去翅足三分生每服一分空心燒酒調下外用金頭蜈蚣一條研末麻油一盞浸二日塗之發初腫腫平貼膏藥又方牡蠣甘草各四兩玄參二兩糊丸茶酒任下又方茜草根煮雞子先煮一滾待凝打