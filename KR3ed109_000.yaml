又方治痔漏胡黃連末一兩穿山甲麻油煮黃槐花炒石決明煅末煉蜜丸如麻子大早晚米飲下一錢四十日效如四邊有硬肉加蠶繭二十炒研並治遍身諸漏又方豬肉三斤好酒三斤煮熟上摻皮硝三錢日日食之管自退出又方硫黃四兩入干豆腐煮一日研紅棗一斤煮爛丸如梧子雄黃二錢為衣日服三錢管自退出兩料愈又方治腸風痔漏下血貓兒殘一兩酒煎露一宿空心服又熏洗方大黃皮硝五倍子各一兩煎湯入冬瓜皮內熏洗又方治痔痛五倍子四兩煎濃湯熏洗如癢加皮硝一方用韭地蚓糞半升又方荊芥皮硝五倍子甘草煎湯熏洗再用田螺冰片水搽又方魚腥草熏洗又點痔方大田螺一個去靨真膽礬一錢冰片一分並研入螺置碗內周圍架好以新鉢蓋之埋人行處一晝夜取出點痔日五次可以除根又方白礬一兩二錢白砒五錢蠍梢八錢瓦焙為末黃丹水飛六錢草烏頭末二錢鐵杓燒紅待冷揩淨先下礬化次砒次下三味生麻油調敷日三次出黃水而消先用筆蘸甘草湯洗淨上藥又方治臭痔生礬一塊塞之又方治痔如瓜以艾灸痔頂五七壯瀉膿血而愈又方治內痔熊膽三分蘆薈雷丸各二分冰片半分胡蘿蔔煨半熟蔥亦可綿裹蘸藥入幽門又方治漏年久者難治者麻雀立屎三粒緑豆六粒飛面輕粉各一錢水調捻條入管外用膏藥貼之三日一上治坐板瘡紫蘇湯加鹽滷一鍾熏洗再用杏仁去油輕粉各一錢豬髓調塗又方雞心檳榔一個香油磨加硫黃少許搽之又方槐枝二斤乾荷葉三張煎湯入鹽二兩熏洗又方桕油一兩枯礬五錢輕粉八分擦之又方蛇床子黃柏等分為末麻油搽又方五倍子五錢枯礬五分鉛汞各一錢炒成粉豬油搽又方甘草湯洗白豆蔻殼燒存性摻之又方煨土磚坐之治爛腿白芷紅占一方用黃蠟飛丹片粉輕粉蔥頭搗豬髓調敷油紙扎住七日一換兩次痊愈又方胡椒玄胡索癢加膽礬癢甚加枯礬為末桐油調搽住又方破靴底爛黃牛皮牛水不用燒為末桐油調搽又方鴉桕樹葉經霜落地者醋浸一宿貼之又方治臁瘡結果久不收口者雄鼠骨黃泥包煨馬屁勃血竭各一兩研末摻之治足趾癢爛楊柳葉一把杏仁三個枯礬三錢同搗夾於趾縫五日而愈又方石膏煅五錢滑石一兩白礬少許摻之又方用黃柏黃連黃丹荊芥為末摻之又方單用輕粉治雞眼痛緑礬用炭水在青石上煅紅研摻於膏藥上貼之又方蜈蚣蚓糞韭地上者油浸十日點之二三日即退出通治服藥治一切腫毒惡瘡用粉草一斤為末用大竹筒一個留節鑽孔貯之椹塞至端午節午時置廁中以磚墜至底四十九日取出曬乾再研瓷器收貯遇小兒出痘見苗及惡瘡毒沙糖調服一二錢妙又方端午日用明雄黃硃砂各五錢麝香少許蟾酥為丸如菜子大酒下三丸取汗又方當歸穿山甲炙各一錢木鱉麻油煎枯每服四分小兒二分酒下取汗不過二服又方魚鰾三兩麻油一碗煎胖黃色研酒過下取汗又方香油一兩頭髮六錢入油熬枯去之以酒過下如畏油以油煎雞子食之亦好又方金銀花連根搗汁和酒服又方槐花子酒煎服儘量取汗又方蟹殼煅三錢生酒下又方酒化白蠟服又方治有膿不穿者用晚蠶繭出過者只用一枚燒存性酒下自穿通治敷藥遇一切腫毒惡瘡初起時用獨蒜切片艾火灸之又方大鱉殼仰放火上入陳醋漸添至一壺存性研末入麝香一分半瓷罐封貯勿令泄氣臨時用香油調敷未成者敷紅處自消已成者敷四沿漸小破頭者乾摻能治一切惡毒及打撲損傷名曰一把抓又方萆麻子四十九粒陳醋一碗半食鹽一撮砂鍋內熬槐枝攪成膏搽又方大黃芒硝蚓糞韭地上者醋搽又方人糞下土蜜水調敷又方白芨一兩五倍子五錢白蘞三錢醋搽又方山藥活鯽魚搗敷又方芹菜煮爛入銀硃搗敷又方治毒未潰而痛不可忍者芙蓉葉黃荊子等分為末雞子清調敷頂有煙起即瘥又方治有膿不穿者雄雀糞白而立者是唾黏軟處又方菊花根生山藥搗敷毒頂以膏藥貼住又方鉛粉黃蠟各三錢芙蓉葉七片冬至日採麻油一兩熬膏攤貼又方玉樞丹塗方見普濟又蝦蟆皮熱貼菩提膏家傳方加減細藥另有單刻香油桐油血餘檳麻子白芥子麝香黃丹萬靈膏香油二斤血餘一兩同煎用柳條攪不住手化盡離火入黃丹一斤攪不住手滴水成珠為度再入乳香沒藥為末各三錢攪勻孩兒茶血竭加入尤妙如筋骨痛加麝香少許年久臁瘡惡毒杖瘡並皆治之餘論癰疽未破毒攻臟腑一毫熱藥不敢用已潰臟腑既虧飲食減少一毫涼藥不敢用此要訣也起時嘔者作毒氣上攻治之潰後嘔者作陰虛治之河間謂嘔者濕氣侵於胃宜倍白朮然白朮能生膿膿未去時當用白芷前三方余家傳方也次七方外科必用方也次分毒與瘡二門而二門之中各從上及下以便查閲次列通治方以便濟人後五方余得之史吉庵者實為外科之祕訣末附梅楊結毒魚口疳瘡而外科大概盡之神而明之則存乎其人伴梅氏識附梅楊結毒並筋骨疼痛及梅楊瘋角弓反張神方夫楊梅一瘡非內因亦非外因正經所謂不內不外因也人之精周流一身骨節上徹泥丸下通尾閭竅衣狀如笙簧每交媾時欲火衝開竅衣精從竅泄值不潔之婦內藏毒氣乘精出竅空惡氣射入竅衣閉毒上泥丸轉降斷交傳入五臟散及周身瘡乃出焉凡治是瘡當先扶正氣次伐病邪毒盡瘡自愈矣患者忙然欲求速效醫者圖利而邀近功過用硝黃巴醜瀉傷元氣或投珠粉水銀毒留筋骨或點緑杏霜以閉毒門種種霸藥不能枚舉病弱之人受此戕伐必喪其軀即不然纏綿日久釀成結毒在筋筋痛在骨骨疼在上則飩頂崩鼻在中則癬喉蛀㽿在下則腐臁爛足甚至毒留胎孕殃及子女仍有遍身麻木手足拘攣角弓反張穢汙呼號夫醫仁術也古人用王道以生人今人投霸術以戕世可不慎歟豫得此方求之雖甚艱辛驗之真為蓋世名曰先天一氣湯輕者二三十帖重者四五十帖終身廢疾兩月痊矣且病愈後身肥氣壯久無後患敬將本方次第録於下先天一氣湯治症見前皂角枝皮根身枝皮俱用即豬牙皂角樹大皂角樹亦可不可用肥皂樹刮去粗皮切片每皮一斤用醋六兩無灰好酒六兩食鹽二兩五錢木柴炭二兩五錢拌勻悶半日炒乾每服稱一兩二錢豬肉四兩乾土茯苓四兩水四碗文火煎肉爛為度取肉切碎不拘配酒配飯吃完肉水三碗煎一碗午間服渣水二碗煎一碗臨睡服冬天煎三次共為一處分作三處再溫服之服至三帖手腳漸漸痠軟或渾身反疼不必為慮至七八帖手腳漸輕疼痛漸止服至十四帖筋骨不痛結毒不臭服至三四十帖肉滿而愈永無後患外帖白玉膏太乙膏照癰疽科法帖之各部引經藥開後上部加桔梗川芎面上加蔓荊子中部不加陰囊破爛疳瘡蛀㽿加豬苓澤瀉下部加牛膝薏苡防己木瓜服此藥不忌雞魚等發物惟忌燒酒牛肉茶一日一帖不可間斷患者如不用豬肉將羊肉代之七貼散治楊梅瘡並結毒神效天花粉桔梗苦參赤何首烏防風荊芥穗各四錢金銀花二錢肥皂子去皮炒褐色為末一錢甘草五分土茯苓一斤去皮槌碎豬板油四兩以上俱忌鐵器水六碗煎土茯苓淡為度入群藥再煎至三碗分三次服渣再煎作茶飲服完七帖即愈又瘡中蟲作癢以蟺血塗數次其蟲盡出八寶丹治結毒甘草節天竹黃真珠各三錢玻珀二錢丁香白芷歸尾粉霜硃砂各一錢二分槐子五分乳末四分牛黃一分陳米飯丸如粟米每服五丸日五服用土茯苓二兩牙皂一枚水三碗煎碗半分五次送下二寶丹治結毒不論遠年近日神效白滑石水飛二錢二分明硃砂水飛一錢五分分十二服每服三分三釐每服配土茯苓一斤去皮杵碎入砂鍋內煮患在上身將藥摻於土茯苓之上患在下身將土茯苓加於藥上井水河水各四碗半煎至四碗半渣照前再煎共得九碗用以代茶一日便盡十二日中不可間斷服至七八日其毒即不疼患重者服兩料全愈忌一切葷腥發物鹽味止可食白粥泉煮犍豬肉亦不過多恐解藥性又方貓兒殘一名十大功勞泡湯當茶黑子者佳治便毒方生於合縫曰便毒生於腎旁曰魚口同治初起不可用涼藥先以發散通利為主川大黃三錢大貝母殭蠶炒朴硝各一錢為末酒送下又方黃牛盤牙一個火煅紅入酒內淬五次單吃酒即消左生用左右生用右雙魚口用兩牙又方槐花蕊焙黃酒下取汗又方大黃香白芷各五錢水煎露一宿午後毒從大便下又方三五日內用大蝦蟆剝去皮連腸加蔥五錢搗爛敷腫處仍用皮覆其上又方五倍子炒為末加百草霜敷又方鹿角燒研粉六錢烏魚骨刮粉四錢香油敷又方陳肥皂核大蒜同搗敷先服雄黃一錢以防內攻治下疳方陰頭生瘡拂之不甚痛曰疳瘡拂之痛甚曰妒精瘡同治先用苦茶洗有毒有風氣血大熱乃生此瘡失治則魚口楊梅繼之矣先用宜升麻葛根湯發散次用龍膽草酒炒澤瀉炒木通山梔生地歸尾黃芩車前子各一錢生甘草五分熱甚加黃連便閉加大黃煎服又方地骨皮燒存性加冰片少許搽患處如干用豬膽汁調一二日即愈又方用磨鏡垢塗又方雄黃黃連塗又方蜜煎甘草敷又方用發灰敷又方治久不愈者用橡頭子窠二個各入黃丹令滿相合以發纏定燒至煙盡研末敷三五次效不染毒方即已染亦解木耳五錢燒存性硃砂五釐空心溫酒下又蠟礬丸亦妙方見普濟治下疳並頑瘡滴乳香二分冰片分輕粉一錢硃砂六釐共為細末搽患處即愈治結毒未潰未穿者內有腫塊取黃牛糞曬乾為末麻油調做餅置患處以艾火灸七次即愈治結毒臭爛大杏仁七粒去皮尖蟬蛻七個去足尖肥皂子七粒打碎土茯苓四兩打碎俱忌鐵器河水四碗煎至一二碗臨臥服一碗將一碗露一宿五更服七日可以奏效忌房事及一切發物治蛀根疳用橄欖燒灰摻之治陽疳潰爛用大田螺五枚將物夾定口俱向上將靨撥開每個入冰片二三釐以碗盛螺待肉俱化為水去螺殼將水調杭粉五六錢復裝入螺殼內外以鹽泥封固煉三炷香為度候冷去泥取螺為細末瓷罐收貯先以蔥湯洗淨瘡口輕輕糝患處即時痛止數次愈治輕粉結毒用好川椒揀粒粒全開口者兩許再用黑鉛斤許熔開候凝面平將椒攤在鉛上鉛冷再熔再攤如此三次椒已紫色每用二錢不用嚼碎早晨空心白滾湯下服後大便糞俱當淘洗其椒粒粒閉口椒內即含輕粉而出直待椒內絶無則毒自散終身不發矣治便毒初起覺腫痛即用鐵稱錘於上按摩數即消一方於便毒未破時用皂莢劈開去子筋膜將黑砂糖填滿線扎定濕紙包十數重炭火煨至紙焦以糖和熱酒一碗空心服其毒即從大便出萬應膏何首烏三兩生地苦參血餘各二兩當歸黃柏獨活荊芥防風連翹威靈仙以上各一兩紅花三錢甘草五錢以上各藥用香油二斤浸一日加松香一斤共煎成膏用後細藥孩兒茶血竭獐腦各一兩乳香沒藥各五錢加桐青三兩更妙若加地鱉蟲二十一個同煎即治跌打損傷濕氣膏川烏草烏肉桂蘄艾川椒以上各五錢研為細末外用薑汁二碗蔥汁一碗真廣膠三兩溶化入前藥在內調勻熬攤標布上貼患處用麩炒尉即愈趙家膏藥方川烏草烏大黃各三兩當歸赤藥白芷白芨白蘞連翹官桂烏藥各四兩苦參皂角各二兩五錢桃枝柳枝桑枝槐枝棗枝各二兩用真芝麻油十三斤將各藥俱浸在內三日如冬天浸七日用炭火熬至藥黑使絹羅將藥渣去淨再熬至滴水成珠可入漂淨黃丹六斤炒過下攪成膏候冷次入乳香沒藥各二兩為末攪勻傾在水中退火毒二日杖棍傷詳誤傷杖畢飲童便和酒免血攻心用熱豆腐鋪在杖紫處其氣如蒸其腐即紫復以熱豆腐鋪之以紫肉散盡為度又方滑石大黃赤石脂各五錢共為細末若瘡干用茶湯洗敷濕即糝上醫夾棍傷當歸乳香鱉蝨胡芝紅花川芎獨活骨碎補五加皮酒煎儘量服避風取汗如傷骨加土鱉蟲一個煎服外科補遺治漏方螃蟹一隻去肉單用殼瓦上焙乾再用鱉頭一個皮肉盡去只留筋骨亦瓦上焙乾各為細末煉蜜為丸臘酒每曰空心服二丸藥盡即退出點痔丹獐腦半斤將陽城罐一個火內燒紅取出入獐腦於中瓷盆蓋口封固候獐腦升在盆上輕輕刮在紙上不可犯鐵器要看火候太熱則飛去太冷則不升次用蘿蔔搗碎煎湯連渣傾在大口甕內坐上熏之候溫傾盆內洗痔拭乾將前藥點之朝發夕愈無不效驗又洗痔方大木耳每日一兩入水煮極化先熏後洗一日三次小者三日大者半月可以全愈又方用枳殼湯熏洗治痔漏脫紅川椒二錢空心鹽湯下治通腸痔漏用大蜘蛛一個重三錢者佳如少一分麻花者俱不用入小罐內鹽泥仔細封固不可有線縫走氣先文後武煅三炷香移於淨地一宿次早開罐用雞毛掃下只有二三分以此藥點在漏管內其管即消其漏即平如點在肉上要爛肉慎之多年癧瘡方鶴蝨草一斤野菊花四兩一錢金銀花四兩一錢五爪龍一兩七錢馬鞭草四季冬月用根夏秋根苗皆用以上俱銼碎用好酒十斤入瓶竹箬箍口瓶上以元米一撮重湯者煮熟米為度掘窖理背陰處三日出火毒初次一盞取汗以後每清晨一盞臨臥服一盞服至五料則病全愈托裡消毒飲白芷白茯苓各八分川芎青皮各六分金銀花一錢五分人參栝蔞仁陳皮小黃耆當歸各一錢白芍白朮各一錢三分貝母一錢甘草五分以上每服加青橘葉十四張洗淨用水二鍾煎七分食後熟服又方用田螺十數個放水內漾淨泥沙取起每個大者用冰片半分小者三釐入田螺靨內置瓷器中候化水將銀針刺破患處用雞毛拂之七日愈又有以田螺射身納瘡中能出積水驗又有用蜒蝣數條搗爛敷患處以上三方是治未破者若已破用豬毛燒灰研末摻上再用前藥拂之又方用豬毛燒灰香油調敷患處又方用鳳尾草陰乾為末好酒送下又用赤剝小老鼠加巴豆去油煎膏貼之又方用紫花地丁生在松陰者不拘多少洗淨加薑汁少許醋少許已破者不用醋搗爛敷患處每日換三四次治肺癰大鯽魚一個重一斤者佳去腸入枯礬二錢煎服兼止痢又方陳芥菜汁窖地中多年者佳日服數匙即起又方魚腥草水煮多食之又方金絲荷葉搗汁同生白酒數飲又方常服苡仁炒研及百合雖吐膿可以無傷治大頭瘟頭頂腫者靛花三錢雞子清一個燒酒一鐘調服又方用灶心土敷之治腦疽初起黃鱔頭七個鯽魚一條去腸鱗頭垢五錢蜂蜜半盞藏糟一塊陳舊者佳搗敷內服敗毒散有時不得鱔頭用之亦妙治瘌痢膽礬硫黃松香川椒並研貯瓷杯內用青布卷豬板油燃火滴入杯內攪勻塗之數次愈治一切贅疣息肉痣斑雞眼桑柴灰風化石灰各一升以鮮鐵甲威靈仙煎濃湯淋汁熬膏貯瓷器內點之一方用蕎麥杆二十斤燒灰淋汁二碗入風化灰熬膏貯罐七日點之少頃拭去治凍瘡蚱蜢炙為末香油調塗濕則摻之又方燒酒洗之又方煎茄根湯洗之已破者用馬剝兒即馬屁勃塗之又方以粗橘皮於燈上烘熱擦之又方以櫻桃擦凍疤即不起熏不收口毒方頭桑葉十大功勞葉各等分為末每服一錢五分用水一大碗煎一沸入葉末在內熏洗一炷香不可住火熏後用荷包草煎酒服二次愈治楊梅癬銀砂四分輕粉六分共為末先以黃連醋磨濃汁將刀剃去蓋拭之方上藥末治疥癩白芝麻一升鹽四兩搗末入瓶務令堅實倒合於篩上以土厚泥篩乃置水於篩下篩土炭高於瓶以灰蓋之一晝夜其油滴於水收油貯於碗內搽疥癩無不效者治蛇膽糯米飲和黑沙糖搗爛塗之治火丹雪裡紅搗汁頻拭之又方皮硝大黃等醋敷治發背等急毒凡中熱毒眼花頭暈口乾舌苦心驚背熱四肢麻木覺有紅暈在背後即取槐子一大撮揀淨鐵杓炒茶褐色用好酒一碗滾過濾去槐子乘熱服酒發汗即愈如仍未退再揀槐子一撮如前炒煎服之極效縱成膿者亦無不效屢試屢驗又治發背神效方用榆樹根皮切碎清水泡洗搗極爛和香油遍敷患處只空瘡頭出氣若藥干用苦茶濕潤如藥不黏更換新者將愈用口嚼桑葉斷筋隨大小貼患處漸收小合乃止加味遺糧湯治楊梅瘡風毒及誤服輕粉癱瘓筋骨疼痛不能動履者服此除根仙遺糧即硬飯糰濕者二兩乾者一兩五錢白者佳紅者傷人俗名冷飯糰本草名萆薢防風木瓜木通薏苡仁白蘚皮金銀花各五分白芙子四分如虛加人參當歸各七分用水一鍾半煎至一鍾空心一服午前一服午後連前二渣煎一服一日三服病淺者十餘日病深者四十日全愈忌食牛羊肉雞鵝魚腥茶燒酒白酒最忌房事洗癬疥方苦參川椒熬水洗神效治暑癤毒用槿樹花搗敷最妙治鵝掌風黃丹二錢生桐油一錢薑汁五分調勻擦手以火烘之清晨洗去治腹中蟲極效方用雞心結實檳榔十二個取石榴樹皮七片每片二指大二寸長要近土與根及向東南者為佳二味成片以水一大碗煎至八分露一宿患人於上半夜先將乾炒肉食在口中細嚼勿令咽下使蟲口俱朝上乃服前藥少頃腹中微動蟲即隨下百試百驗若至下半夜則口又朝下雖服無效矣治鶴膝風金燈草一名牛兒不食草一名舉燈頭草上開紅花下如蒜頭者搗糯米飯敷之三四次有黏水出水儘自消治單蛾方生蜜滴入喉中以吐痰為度次用大蜘蛛瓦上焙為末加冰片三釐吹之即愈又收口方象皮炙研沒藥研血竭研乳香箬炙去油研各五錢兒茶三錢海螵蛸研二錢貯瓷瓶內摻膏藥貼之治臁瘡年久及腳上下諸瘡疼痛者射干二分冰片二分血竭輕粉赤石脂枯礬各二錢銅緑八釐黃丹老松香各一兩人乳鉢順研極細封貯瓷瓶每用二錢桐油調攤油紙上為夾紙膏將濃茶洗淨瘡膿兩邊貼之三日一換半月可愈又臁瘡方龍骨七分研黃丹七分黃蠟五錢桐油二兩先將桐油熬滾下蠟化盡再下前二味攪勻傾水中凝後取出做夾紙膏貼又方用桐油煎豆腐少溫貼之治赤鼻方硫黃明礬各一兩五錢硼砂一錢真牛黃五分併為末貯瓶勿令泄氣用時先洗淨鼻以藥擦紅處打噴嚏為度日擦五次半月即白飛龍奪命丹一切無名腫毒疔瘡發背癰疽乳癰各種惡瘡服之無有不效者惡症方中之至寶也蟾酥二錢乾者酒化血竭一錢乳香二錢雄黃三錢輕粉五分膽礬一錢麝香五分銅緑二錢寒水石一錢硃砂二錢為衣蝸牛二十個蜈蚣一條上為細末將蝸牛連殼研為泥和前藥為丸如緑豆大打麵糊為丸每服二丸先將蔥白三寸令病人嚼爛吐於手心男左女右再將藥包在蔥內用無灰酒送下務要避風蓋暖少刻再用熱酒數杯以出汗為度如汗不出再服二丸過三五日再進二丸以瘡之上下定食之前後忌一切生冷發物
