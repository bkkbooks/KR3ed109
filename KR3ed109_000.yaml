眼歪亦有中筋亦要知六經無症溺調和口不能開支不持諸家之論各扁知若還拘泥枉勞思其原大率主血虛亦有氣虛兼痰滯中有夾火與濕者總以治痰補養次治痰須憑二陳湯茯陳甘半增貝防更加竹瀝生薑汁磨入沉香與木香在左屬血右屬氣血虛加芍芎歸地瘀血桃仁與紅花氣虛參朮耆同異盜汗遺尿亦如之小便不利不可利風盛自汗身體痛秦艽羌活並薄桂頭目不利或頭疼芎芷蔓荊辛芥穗頂痛去芎易藁本酒炒片芩同其類無汗身疼羌芷芎麻黃蒼朮秦艽蔥心血虧缺神恍惚歸連遠志菖蒲術或心動搖驚悸者酸棗茯神茹側柏風痰熾盛加南星枳殼皂角瓜蔞仁食填麴櫱連楂實甚者還須吐下行急救凡見中風中氣昏倒者倉猝之際急以手大指掐其人中即醒如不效用通關散吹鼻即提起其頭有嚏可治如口噤不開用化風丹擦之口開即多灌香油或加麝香少許或用紫金丹酒磨服或用瓜蒂散或用生礬二錢薑汁灌之壯者用油吐之老人以蝦汁煎參耆防桔吐之得吐即生通關散治牙關緊急湯水不入天南星半夏牙皂各五錢為極細末用少許吹入鼻有嚏可治無嚏不可治化風丹此方居家宜備治中風痰厥風癇牙關緊急及小兒驚風搐搦角弓反張發熱痰嗽喘促並皆治之膽星二錢如無即用牛膽制之天麻煨防風去蘆荊芥穗羌活獨活去蘆人參去蘆細辛川芎各一錢木香五分煉蜜丸如芡實大硃砂為衣薄荷煎湯研化服因氣惱用紫蘇湯化服如牙關閉用少許擦牙即開青州白丸子治男婦手足癱瘓風痰壅盛嘔吐痰沫及小兒驚風半夏七兩白者泡過南星生用白附子各二兩川烏頭五錢炮去皮臍為極細末以生絹袋盛之於井花水內擺出其有未出者再研擺以盡出為度置瓷盆內日曬夜露每晨換水攪而復澄春五夏三秋七冬十日去水曬乾如玉碎研用糯米粉煎粥清為丸緑豆大癱瘓風濕酒送下二三十丸小兒驚風薄荷湯下三五丸攝生飲治一切中風中寒中暑中濕及濕厥氣厥不省人事初作即服神效南木香南星濕紙煨半夏滾水泡各一錢五分蒼朮甘草遼細辛石菖蒲各一錢生薑七片煎服痰盛者加炙全蠍二枚烏藥順氣散治風氣攻注四肢骨節疼痛麻痹癱瘓語澀筋攣步履艱辛腰膝軟弱及婦人血氣老人冷氣胸膈脹滿刺痛腸鳴吐瀉夫治風先理氣氣順則痰消凡氣滯氣鬱之類皆可治烏藥麻黃去節陳皮去白各二錢川芎白芷殭蠶炒枳殼去瓤麩炒桔梗去蘆各一錢乾薑泡五分甘草炙三分薑棗煎服憎寒壯熱加蔥白遍身搔癢加薄荷手足拘攣加木香石斛濕氣加蒼朮白朮檳榔足浮腫加牛膝五加皮獨活遍身疼痛加當歸肉桂乳香沒藥有虛汗用麻黃根去麻黃加黃耆倍乾薑胸膈脹滿加枳實莪朮頭眩加細辛細茶腳不能舉動加羌活防風麝香心腹敕痛加小茴香手足不能舉頭項不能起加川續斷威靈仙陰囊浮腫合五積散四肢冷痹加川附子官桂秦艽久患癱瘓去麻黃乾薑加天麻防風羌活半夏南星木香當歸麻痹作痛加天雄細辛防風婦人血風加防風荊芥薄荷臂痛加羌活防風蒼朮紫蘇薄桂氣滯腰痛加桃仁入酒煎服背心痛合行氣香蘇散加蒼朮半夏茯苓口眼喎斜加姜炒黃連羌活防風荊芥竹瀝薑汁麻痹疼極者合和三五七散日夜疼痛日輕夜重者合神祕左經湯二三年不能行者合獨活寄生湯小續命湯惟真中腑者用治卒暴中風痰涎盛壅外有六經形證宜發表者麻黃去節杏仁泡去皮官桂曰芍藥川芎防己黃芩人參甘草炙各二錢四分防風一錢附子炮去皮臍七分生薑五片煎服隨六經形證加減於下內經曰開則淅然而寒閉則熱而悶知暴中寒邪宜先以續命湯隨證加減治之風中太陽經無汗惡寒倍麻杏防風中太陽有汗惡風倍桂杏芍中陽明身熱有汗不惡風倍桂芩加乾葛中太陰無汗身涼倍附子加乾薑中少陰有汗無熱倍桂附草中風無此四經六證混雜繫於少陽厥陰或肢節攣痛麻木不仁倍加羌活連翹大法春夏加石膏知母黃芩秋冬加官桂附子芍藥有熱以白附子易黑附子筋急拘攣語遲弦加薏苡仁筋急加人參去芩芍以避中寒服後稍輕加當歸煩躁不大便去附桂倍芍加竹瀝三日不大便胸中不快加枳實大黃言語謇澀手足戰掉加石菖蒲竹瀝發渴加麥冬天花粉葛根熱而渴加秦艽身痛加羌活搐亦加之煩躁多驚加犀角多怒加羚羊角恍惚錯語加茯神遠志不能言加竹瀝失音加石菖蒲頭痛如破加羌活骨節痛有寒濕倍附桂嘔逆腹脹加半夏人參腳膝弱加牛膝石斛腰痛加桃仁杜仲薑汁炒不睡加酸棗仁痰多加南星肥人多濕加烏附行經童便制臟寒下痢去防己黃芩倍附子加白朮狂妄加白朮倍麻黃人參桂枝自汗去麻杏加白朮三化湯中者用外有六經之形證已服加減續命湯尚有便溺阻隔宜用厚朴薑汁炒羌活大黃枳實各等分姜煎服如不利再服以微利為度如內邪外邪已除宜服愈風湯以行中道凡中血脈中腑之病忌驟用龍腦麝香牛黃蓋麝入脾黃入肝腦入骨恐引風入內也羌活愈風湯中濕者用肝腎虛筋骨弱語謇澀精神昏濕熱體重或痰而一肢偏枯或肥而半身不遂大抵心勞而百病生此藥能安心養神調理陰陽使無偏勝生地石膏蒼朮各六分柴胡防風人參當歸皆去蘆細辛去苗枳殼麩炒地骨皮去骨厚朴薑製羌活獨活白芷前胡防己甘草黃芩白芍白茯苓蔓荊子熟地川芎麻黃薄荷甘菊知母黃耆杜仲秦艽半夏枸杞子以上各四分桂枝一分遇天陰加姜三片空心服頭煎臨臥服二煎此常服之藥當加四時之輔大寒後即加半夏柴胡人參穀雨後即加石膏黃芩知母季夏加防己白朮茯苓大暑後即加厚朴藿香官桂霜降後即加附子官桂當歸五臟專治出良方選凡風入臟皆多汗惡風肝臟岐伯曰春甲乙傷於風者為肝風筋脈拘攣手足不收風入肝坐踞不得胸背強直脅肋脹滿目眩心煩言語謇澀射干湯治肝經受病善悲嗌乾善怒女子目下青黃色可治急灸肝腧百壯更宜行經順氣若目下大段青黑一黃一白不治薏苡仁三錢射干芍藥各二錢半牡蠣石膏各二錢桂心五分水煎溫服犀角散治肝風流注四肢上攻頭面上焦風熱口眼喎斜語言謇澀腳膝疼痛無力犀角石膏各二錢羌活羚羊角各一錢半人參甘菊獨活黃芩天麻枳殼去瓤麩炒當歸黃耆芎藭白朮酸棗仁防風白芷各五分甘草三分薑棗煎服又方治肝風煩熱語澀不得臥竹瀝荊瀝葛根汁薑汁白蜜各一合不拘時服心臟岐伯曰夏丙丁火傷於風者為心風多汗惡風善怒神亂語澀舌強口乾面赤頭疼翕翕發熱胸背拘急手心熱甚偃臥不得傾側忪悸不安遠志湯治心經受病善怒口不能言偃臥不可傾側悶亂胃絶者其唇色正赤尚可治急灸心腧百壯或青黃不定面色日亭日亭戰栗動者不治白朮赤芍各一兩石菖蒲羌活細辛麻黃去根各五錢人參遠志去心各二錢半為細末每服二錢小麥湯調下日二服麻黃散治心風心驚聲濁口喎冒昧好笑羌活茯神遠志各一錢半白朮防風川芎漢防己當歸人參甘草麻黃去節各一錢升麻八分桂心五分姜煎入竹瀝半盞再煎一二沸服脾臟岐伯曰季夏戊巳傷於風者為脾風多汗惡風四肢怠惰色微黃不嗜食言語謇澀口喎僻肌膚不仁腹膨心煩翕翕發熱神思如醉其脈浮緩白朮湯治脾經受病體倦通身黃口吐鹹水不能飲食口角兩邊黃者可治急灸脾腧百壯目下及手足青者不治白朮三錢厚朴薑製防風各二錢附子泡去皮臍橘紅白蘇皮五加皮各一錢生薑煎服獨活散治脾風胸滿痰盛語澀發熱志昏獨活去蘆一錢五分防風茯神去木人參附子泡去皮臍前胡沙參半夏湯洗七次黃耆旋覆花甘草炙羚羊角各一錢生薑煎服肺臟岐伯曰秋庚辛傷於風者為肺風主氣氣為衛行於表循於皮若衛氣虛少風邪相搏則胸滿短氣謂金不能制木肝肺相剋胃悶汗出噓吸顫掉聲嘶體重其脈浮弦五味子湯治肺經受病時咳氣短晝瘥夜甚偃臥胸滿其鼻兩邊下至於口上至於眉白色急灸肺腧百壯若色黃其肺化血不治若撮空指地循衣摸床俱不治防風甘草炙川芎赤芍各二錢五味子杏仁炒去皮尖桂心各一錢川椒三分水煎溫服腎臟岐伯曰冬壬癸中於風者為腎風腎氣虛弱風邪侵之踞而腰疼不便俯仰或兩耳虛鳴聲濁面浮節痛神昏肌色黧黑易妄體重多汗惡風隱曲不利萆薢散治腎經受病多汗惡風面浮脊疼坐而腰痛其脅上下左右赤黃如餅可治急灸腎腧百壯齒黃鬚髮直面如土色不治萆薢酒浸狗脊杜仲炒去絲白茯苓去皮各一兩何首烏天雄炮去皮臍澤瀉各五錢每服二錢米飲調下祛風至寶丹治諸風熱滑石三兩當歸川芎各二兩半硃砂飛過為衣甘草各二兩防風芍藥各一兩五錢白朮一兩三錢獨活羌活天麻石膏黃芩熟地人參桔梗各一兩梔子六錢荊芥穗全蠍去毒細辛連翹薄荷黃連黃柏麻黃大黃芒硝各五錢二十七味煉蜜丸如彈子大臨臥細嚼一丸茶酒下熱甚去參朮川芎加苦參細茶鹽梅薄荷湯下痛甚倍苦參精神解語湯治中風痰迷心竅舌強不能言口眼歪斜半身不遂四物二陳加麥冬遠志去骨甘草水泡南星同半夏白芍俱用生薑牙皂煎湯浸三日枳實麩炒烏藥黃連薑汁炒防風羌活石菖蒲生薑竹茹煎好再入薑汁竹瀝童便服頭痛加蔓荊細辛白芷遠志膏治中風不能言遠志三兩甘草水泡不去骨為末雞子清調敷天突咽喉前心三處訶子清音湯治失音不語訶子四十九粒半生半泡桔梗一兩半生半炒甘草二錢半生半炙每服七錢用煎熱童便一大碗調服三四服見效丹方治風癱用土茯苓四兩木捶碎五加皮八分牛膝肉皂角刺各六分水三碗煎二碗食遠服渣煎七分臨臥服忌牛肉茶醋燒酒麻油治半身不遂歌曰牛膝去蘆藏鴨肚重湯煮服病相宜淨除牛膝存湯鴨每日常餐功效奇又方當歸五加皮各四兩黑料豆半斤若加牛膝木瓜桑寄生更妙頭燒酒三十斤浸早晚服之又方番白草一味煮酒飲之效如神治口眼歪斜方細說合成妙藥臉間貼先搗萆麻子取仁再調一味蟺魚血歪左之時貼右邊右邊歪口左敷曳胎斜扶正救民災何必私心藏祕訣又方用生南星研末青布包放在手心以熱酒壺底尉之朝右尉左手朝左尉右手治産後驚風及傷寒角弓反張歌曰大麥田中麥梗灰先燒存性取將來滾水淋湯乘熱服重棉取汗立時回治失心風乩授方莫說瘋癲莫說狂今朝留下草頭方香圓葉是驅痰藥桐樹枝名降火湯竹翠木瓜皆有益金萱黃菊兩無傷撮來件件俱仙餌一笑天然樂壽長又方不落水豬心一個竹刀割開入辰砂飛過末三錢半用麻線扎定外用麵包煨熟取硃砂乘熱為丸每服甘草湯下五分七日服完其豬心任意之屢驗餘論內經曰風善行而數變或為熱中或為寒中或為寒熱或為癘風或為偏枯至於猝暴僵仆四肢不舉者無所論只有偏枯一語而已千金引岐伯曰中風大法有四一曰偏枯半身不遂知與有常二曰風痱四肢不收微有知覺三曰風懿不知人事四曰風痹麻痹不仁金匱中風篇曰寸口脈浮而緊緊為寒浮為虛寒虛相搏邪在皮膚喎僻不遂邪在於絡肌膚不仁邪在於經即時不勝邪入於腑即不識人邪入於臟舌即難言口吐涎沫故偏枯等證每用大小續命排風等湯以散之河間曰以火暴甚腎水虛衰不能制之熱氣拂鬱心神昏冒筋骨不用又因喜怒思悲恐五志過極而猝中其主在熱東垣曰中風者非外來風邪凡人年逾四旬傷其氣者多有此疾少而肥盛者間有之亦是形盛氣衰之故其主在氣彥修曰西北氣寒為風所中誠有之矣東南氣溫而多濕其病者非風也濕生痰痰生熱熱生風也其主在濕丹溪曰有氣虛有血虛有痰甚皆以風為虛象究而論之古書所載言其證也河間以下諸論言其因也所謂外中風邪者必由元精虛弱榮衛失調而後感之所謂因熱因氣因濕者未必絶無外邪而作也治之之法急則治標緩則治本如初病暴僕不省人事痰涎壅盛急用通關散化風丹以開之舌強不語兩寸口脈浮大而實者急吐之以遏其勢或人迎緊盛六脈浮弦用小續命湯表之其中於臟者各隨其經而理之所謂急則治其標也其或早覺於未發之前與調治於稍平之後則清其熱化其痰補其血與氣各治其所因使無後患所謂緩則治其本也脈訣舉要曰中風脈浮滑兼痰氣其或沉滑勿以風治蓋外有痹痿氣厥脾虛傷食及吐太過皆令人猝倒四肢不舉而中氣尤酷似中風當慎察脈理浮弦緊洪為中風沉伏為中氣若中氣而用風藥殺人矣若辨別未清寧先用順氣散次用疏風藥蓋治風亦宜理氣也治破頭風蒼朮火燒草烏共為末溫酒服之汗出為度又方魚膠燒存性研末調熱酒服之愈治男婦氣血衰弱痰火上升左癱右瘓臂體手足疼痛等症以人乳二酒盞香甜白者為佳以梨舂汁一酒盞傾放銀錫器入湯內燉滾熱有黃沫起開青路為度每日五更後一服能消痰補虛生血延壽乃以人補人其效無如即半身不遂者曾服此方亦效固本酒生地黃二兩熟地黃二兩天門冬一兩麥門冬二兩白茯苓二兩人參二兩用瓷瓶盛好酒十大壺將前藥切片入內浸三日用文武火煮一二時以酒黑色為度如上熱去人參五錢如下虛寒將韭子炒黃色為細末空心服三五盞每盞用炒末一錢或五分妙難盡述忌蘿蔔要緊治痰橘皮用真洞庭陳者溫水浸去穢白取紅一片甘草四兩鹽四兩用水五碗慢火煮焙乾為末白湯點服世醫但知用半夏南星等類何足語此治痰厥方厥甚者以吐為上半夏八兩防風四兩甘草二兩炙共為細末每服三錢用生薑二十片入水一大盞煎至七分入前不拘時服治中風失音並一切風疾用白殭蠶七枚為末用酒調服立效治中風或吐瀉牙關噤不能下藥用白楊末不拘多少揩牙立開因酸能收斂齒必開也治偏風手足不遂用仙靈脾一斤細銼絹袋兜浸酒春夏三日秋冬五日重重封閉勿使失氣逐漸開飲常令熏熏不得大醉久之無不效驗合時切忌雞犬見鬱金丸治癲狂數年不愈鬱金七兩真蜀地來者佳明礬兩為末薄荷湯水送下或以生薑汁為丸仍以薑湯下多服甚效治中風通身冷口噤不知人者獨活四兩去蘆用好酒四大盞煎分二三次熱服史國公藥酒方專治風痰半身不遂手足攣拘不堪行步等症防風去蘆二兩秦艽去蘆二兩當歸二兩羌活二兩白朮二兩虎脛骨碎炙一對萆薢碎炙二兩鱉甲二兩川牛膝去蘆二兩油松節捶碎二兩杜仲薑汁炒晚蠶砂炒黃色二兩蒼耳子捶碎四兩枸杞子五兩干茄根飯上蒸熟八兩上以布袋盛大壇內下好酒三十六斤封口浸十四日將壇入鍋懸煮三炷香埋土內三日去火毒每日辰午晚隨量飲之都梁丸治頭風疼甚效用白芷洗淨煉蜜為丸如彈子大每服以荊芥煎湯調服若因虛頭疼以人參一兩川芎五錢煎湯服甚妙傷暑門脈虛身熱傷暑病暑入口齒心主應大渴倦怠背惡寒自汗毛松心煩悶四肢微冷吐瀉兼身體但無疼痛症加減香茹湯可施麥冬五味茯苓皮扁豆黃連及甘草燈心薑棗水煎之加上柴胡因熱身元氣不足共參耆嘔加半夏須姜炒渴用天花此最宜小水不利或短赤澤瀉山梔加入歟或自汗兮或水瀉升麻白朮總相宜頭痛川芎石膏好痰悶栝蔞枳實隨俱可益元散常服熱渴虛煩效更奇古香茹散惟茹朴豆後加連後又加合君子名八味加黃連耆木瓜名十味藿香正氣散見霍亂消暑丸半夏醋煮一斤甘草生茯苓去皮各八兩薑汁煮糊丸如桐子大熱湯五十丸中暑藥下即蘇傷暑發熱頭疼尤效夏月常服止渴利小便諸方概不及此痰飲停積並用薑湯下水葫蘆治暑毒解煩渴川百藥煎三兩麥冬烏梅肉白梅肉乾葛甘草各五錢人參二錢麵糊丸如芡實大夏月出行一丸可度一日餘論傷暑酷似傷寒蓋亦有頭痛身熱者庸醫以真傷治之每致斑毒發黃小便不通悶亂而死痛哉不知夏月無真傷寒斷不可服熱燥藥其或避暑為陰寒所逼頭痛無汗傷脈浮緊者用五積散主之方見中寒若多食冷物致傷脾胃止用溫脾消食利小便藥而已又調養法夏月間居恆用白朮一錢五分麥冬去心一錢煎以代茶或用人參麥冬五味子名生脈散或用辰砂六一散可以永無傷暑之恙一方用不蛀皂角不拘多少刮去黑皮燒煙將盡用盆合於地上勿令透煙每灰一兩入甘草末六錢和勻服一錢新汲水調下如氣虛人溫漿水調下昏迷不醒者不過兩服注夏陰虛不足元氣亡氣虛血弱熱因傷脈無力者四肢倦心煩食少腳郎當好臥口乾不長肉治用補中益氣湯參耆甘草固元本白朮陳皮五味嘗黃柏升麻歸養血柴苓知母麥門冬盜汗須加浮小麥便赤山梔與木通頭疼川芎並白芷渴用天花粉烏梅大便不實砂仁好嗽加白虎杏仁隨倘然泄瀉加蒼朮依斯調理病無危補中益氣湯詳內傷餘論注夏似無傷大體不知因氣虛而受病因病而氣益虛忽而不治身體由之傷矣人人恐犯歲歲有之故吾友特為歌括余嘉其意因不忍略傷濕門東南之地恆多濕居民感受患非一或受山嵐露雨蒸或過飲冷因雨得小便短赤身體重骨肉痠麻行不疾漸加浮腫及身黃加減滲濕湯可識陳皮半夏茯苓甘厚朴黃連蒼白朮煎用燈心棗與姜臨服二匙鹽可入外濕寒熱身腫痛芩姜木通加有益內濕食入必嘔吐中滿喘脹是其則黃連楂入炒卜子小便不利豬苓澤濕熱發黃茵陳加澤瀉豬苓兼滑石黃柏山梔與木通隨症加減為良策腎著湯治腎虛傷濕身重腰冷如坐水中即四君子湯去人參加乾薑滲濕湯治腎虛傷濕小便赤大便溏用薑苓木草腎著加蒼朮橘紅丁香單方治中濕通身疼痛白朮去蘆二兩酒一碗半煎至一碗溫服餘論外濕由冒雨及坐濕內濕由酒麴與生冷外濕宜汗內濕宜利而皆以行風散濕健脾為主濕生痰故用二陳湯加風藥一方治玉莖有時受濕瘠甚以肥皂一個燒存性用香油調塗於上即愈一方治婦女下部濕癢蛇床子煎湯洗愈治中濕口噤不知人事用白朮一兩切片作一服用酒三盞煎一盞頓服不飲酒者水煎亦可黃疸門疸雖分五實歸一蓋是脾虛胃不實水穀濕熱相鬱蒸發熱腹痛便赤澀欲除濕熱去其黃清利小便為第一茵陳澤瀉豬苓茯肉桂山楂與滑石山梔枳殼共陳皮甘草木通並白朮若還腹滿大便難藥中須挾將軍力渴而熱甚必難醫手足心黃治無益茵陳五苓散朮瀉豬茯桂共二錢合茵陳末四錢日三服大茵陳湯治時行淤熱在裡鬱蒸不散通身發黃茵陳二兩大黃一兩梔子仁三錢每服四錢必效散五疸通治葶藶隔紙炒龍膽草山梔茵陳黃芩等分每服一兩小溫中湯治輕疸兼去食積蒼朮川芎香附神麯針砂醋炒紅春加芎夏加苦參或黃連冬加吳茱萸或乾薑大溫中湯治黃疸並食積又能制肝燥皮脾虛者以參朮芍藥甘草陳米湯下陳皮蒼朮厚朴三稜蓬朮青皮各五兩甘草針砂醋炒紅各二兩香附一斤醋糊丸空心姜鹽湯下飯後酒下忌犬肉及果菜單方地骨皮搗汁和白酒飲之即愈一云豬膽汁和白酒又方生白礬於伏天曬開大棗為丸每服二三錢服後多食肉以壓之又方緑礬炒至白色為度或入瓶煨白尤佳煮棗為丸如櫻桃大每服五丸日三服俱冷黃酒下忌生冷發物若有蟲亦吐出神效餘論疸症有五曰黃汗黃疸酒疸谷疸女勞疸而其實皆緣濕熱鬱蒸於脾治法以利小便為主然亦有傷寒後解散未盡者其證口淡耳鳴怔忡腳軟微寒熱下白濁此為虛證不可專用涼藥脈訣曰五疸實熱脈必洪數其或微澀證屬虛弱丹溪曰輕者小溫中丸重者大溫中丸熱甚加苓連火門有餘之氣名為火妄動須知爍至陰實者瀉之虛者補重升輕降理誠深陰虛發熱陽旺盛脈數無力屬心腎內傷發熱乃陽虛脈大無力肺脾分氣從左起肝之火陰火還從臍下生腳下熱來侵腹者斯人虛極藥難平瀉火黃連解毒湯補虛參朮生草良鬱火隨經宜發散風寒外來散之良心火黃連肺黃芩肝膽之火柴連親芩連可瀉三焦火臟火偏宜青黛尋芍藥瀉脾知母腎石膏胃火蘖滋陰若要瀉卻膀胱火須加黃柏與細辛木通專瀉小腸火鬱火升麻與葛根若治無根遊行火劑中何可失玄參黃連解毒湯詳餘論非實火不可驟用涼藥必先溫散蓋風寒外來者宜散鬱火宜散生甘草能緩火邪山梔仁大能降火心痛門原知心痛即非真胃熱須分久與新新則胃家傷物冷久成濕熱必逡巡熱多左手脈必數脈澀應知死血因右脈實時痰積痛脈洪久血作災迍治法總施平胃散乾薑甘草蔻砂仁枳實木香並桔梗此醫新者效如神若還久病加胡索桔梗黃連兼枳實木香梔子一同煎方信醫家靈妙藥辨證胃痛有九曰飲曰食曰風曰冷曰氣曰悸曰蟲曰疰曰去來熱痛河間曰暴痛非熱久痛無寒有因氣而食卒然發痛大便或祕心胸高起按之愈痛不思飲食者急以煮黃丸利之利後用藁本湯去其餘邪有寒厥心痛者手足逆而身有冷汗便利溺清氣力微弱非久病也朝發夕死急以朮附湯溫之有熱厥心痛者身熱足寒痛甚則煩躁而吐額自汗當灸太溪及崑崙表裡俱瀉通身汗出而愈灸畢服金鈴子散痛止服枳朮丸去其邪又醫鑑載面上有白斑唇紅痛後能飲食時作時止者蟲也二陳湯加苦楝根皮煎服肚大青筋取蟲丸主之煮黃丸積聚治大實痛雄黃一兩巴豆五錢去皮生研入雄黃末研細白麵二兩同和再研滴水丸如桐子服時先煎漿水待沸下二十四丸煮一二十沸撈入冷漿水沉冷先服一丸逾一時再二丸再三丸加至微利為度用浸藥水送下兼治脅下痃癖痛如神藁本湯毒氣治大實痛已利用此徹毒藁本三錢蒼朮六錢水煎溫服朮附湯寒痛治寒厥痛又治風濕相搏身重疼煩大便堅實及風虛頭重目眩者暖肌補中助陽氣止自汗附子一兩炮去皮臍細切白朮四兩甘草一兩炒每服三錢薑棗煎服金鈴散久痛治熱厥痛或發或止久不愈者金鈴子玄胡索各一兩每服三錢酒調下清郁散痰痛治胃中有伏火膈上有停痰胃口作痛及噁心嘔吐清水或酸水二陳湯加梔連蒼芎乾薑香附嘔吐甚加藿香砂仁此方為丸服亦妙宣氣散治心胃刺痛牽引胸脅脈數者梔子仁鹽炒大黃滑石木香以下三味為末以生薑梔子煎湯和藥溫服在上必吐在下必下外炒蘿蔔子絹包尉患處四聖丹治心痛並腹痛陰證絞腸痧神效五靈脂炒出煙桃仁麵炒黃色去皮尖草烏水泡一日一換浸一七日去皮尖切片用新瓦焙乾各一兩青黛二錢入藥八錢為衣酒糊丸如桐子每服十五丸用艾七片炒出煙沖黃酒下追蟲丸蟲痛治蟲咬痛乾漆五錢炒盡煙雄黃二錢五分巴霜一錢麵糊丸如黍米有子苦楝根皮煎湯下十二三丸加味枳朮丸治酒積茶積肉積清痰在胃脘作痛及痞滿心嘈雜噯氣吞酸脾胃等症白朮三兩枳實麵炒蒼朮米泔浸二宿焙豬苓去黑皮川芎麥蘖面炒黃神麯炒半夏湯泡透各一兩澤瀉去毛白螺螄殼炒黃連陳壁土炒赤茯苓各七錢砂仁草豆蔻黃苓土炒青皮去白萊蔔子炒乾薑各五錢陳皮去白栝蔞子香附米童便炒厚朴薑汁炒檳榔各三錢木香甘草各二錢吞酸加吳茱萸湯泡寒月五錢暑月二錢半久病挾虛加人參白扁豆石蓮肉各五錢常吐清水加滑石一兩炒或牡蠣五錢青荷葉泡湯浸粳米粉如梧子清米飲下百丸單方山梔炒黑每服二三匙心腹痛薑湯下四肢腫米飲下小便澀白湯下一方加川芎二錢治心疼口噤幾死者老蔥白三五根去皮須搗膏灌入喉中再以香油灌之積滯蟲物皆化黃水微利為佳治蟲痛每日空心嚼棐子肉二十七枚三日蟲下治大人小兒痞塊癖積全蠍酒浸洗炙三錢雞肫黃皮酒炙三錢砂糖丸五更酒下二錢半又方卒急無藥以鹽置刀頭燒紅淬入水中乘熱飲之吐痰而安此法並治絞腸痧餘論痛則不通通則不痛心脾痛者內有鬱熱頑痰死血蟲物或因惱怒或因風邪而作切不可用補氣藥九種心痛瓦楞子即麻蛤蜊醋火鍛三分香附童便浸三分樟樹子三分三味焙乾共為末或酒或薑湯送下立止又方香附石灰炒良薑麻油炒蒼朮鹽水炒各一兩共為末每服二分或酒或薑湯下又方廣木香九錢三分明礬七分煉飯為丸每服一錢燒酒下又方用胡椒一歲一粒白滾湯下又方兔糞焙乾燒灰存性為末黃酒下三錢效胃痛又方核桃肉七個連皮搗爛入好砂糖在內調和用熱大酒一碗沖吃愈治一切心痛不問新久用生地黃搗絞取汁搜面作餛飩或冷淘食之良久即刻出蟲長一尺許遂不復痛昔有痛垂死語其子剖視之後以此汁飼之蟲乃死因得此方屢治人屢效又方治暴心痛不可忍用荔枝核為末每服一錢酒醋各半盞煎至七分熱服治絞腸痧痛不可忍展轉在地欲死者用鹽一兩熱湯調灌病人口中鹽氣到腹其痛即止梔子湯熱病肥梔子十枚打碎薑汁浸炒連殼研川芎香附各一錢煎數沸入薑汁三匙再滾入百草霜二匙調服蒲脂散血痛蒲黃炒五靈脂酒炒淘去沙各一錢醋調如膏加水煎服盞落湯氣痛陳皮香附良薑吳茱萸石菖蒲各等分煎好另用碗入香油三五點將小盞蓋之將藥淋下熱服面腫門升麻冒風湯升麻冒風葛芷蒼柴藁蔓歸草蔻羌甘柏麻黃薑棗煮能消面腫與牙眶餘論陰脈至頸胸而還惟陽脈上頭故面獨耐寒而足陽明胃經起鼻交額中入齒挾口環唇倚頰上耳前胃中風熱乘之令人面腫肺風斑靨方見外科頭痛門頭疼即非真頭疼氣火虛風痰火盛若是真疼手足青旦發夕兮歸幽冥加味芎歸治諸痛芎歸芷桔羌參苓甘草升陳荊朴草生薑竹瀝欲通靈治頭痛妙方土茯苓四兩忌鐵器金銀花三錢蔓荊子一錢玄參八分防風一錢明天麻一錢辛夷花五分川芎五分黑豆四十九粒燈心三十根牙茶五錢河水井水各一鍾半煎一鍾服羌吳湯羌吳湯藁麻升耆黃柏芩連芎與歸細蔓紅花蒼朮半頭頂項痛即時移單方鬧楊花川芎各等分為極細末左痛吹左鼻右痛吹右鼻連打數嚏鼻清水即愈又方頭風偏正最堪憐近日奇方治遠年可取黃牛腦一個川芎白芷各三錢共為細末擦於腦瓷器盛末加酒煎頓熱食之酒儘量醉目酒醒痛安然一方用豬腦餘論王節齊云久病頭痛略感風寒便發者內鬱熱而標寒也本有鬱熱毛竅常疏故風易入寒束其熱故痛愈甚世人用辛散之劑雖能散其標之寒邪然以熱濟本病益深當瀉火涼血而佐以辛溫則痛可愈而根可除頭暈門天麻半夏與黃芩橘皮柴胡草茯苓風痰內作胸膈悶頭暈目黑自安寧天麻半夏湯治頭暈治風痰內作胸膈不利頭旋目黑兀兀欲吐上熱下寒不得安臥此皆虛風內外作故以天麻為君偏頭痛乃少陽也非柴胡不能治黃芩苦寒酒製炒銼柴胡治上熱又為引用故以為臣橘皮苦辛溫甘草炙甘溫以治風痰白茯苓甘平利小便導濕熱引而下行故以為使不數服而愈天麻一錢為君黃芩酒製五分為臣橘皮去白七分柴胡七分半夏一錢甘草五分炙為佐白茯苓五分為使以上銼如麻豆大都作一服水二姜三煎至一盞去渣溫服耳病門辨證忿怒動膽火左耳聾宜龍薈丸色欲動相火右耳聾宜地黃丸醇酒厚味動胃火雙耳聾宜通聖散滾痰丸三者之中由忿怒居多色欲傷腎難治丹溪曰厥陰少陽熱當開痰散風熱龍薈丸聰耳瀉火龍膽草酒洗當歸酒洗梔子仁炒青皮黃芩各一兩蘆薈柴胡大黃青黛各五錢膽星三錢木香二錢五分麝香五分神麯糊丸如緑豆薑湯下二十丸日進三服七日後用針砂酒以通其氣通聖散通聖防風將軍芍薄荷芎歸草朴硝梔翹芩梗並白朮荊芥麻黃滑石膏地黃丸見補損滾痰丸見痰飲針砂酒善通耳氣穿山甲為末一錢針砂一兩拌一晝夜播去山甲以酒一碗浸三四日口內噙酒外用綿裹磁石一塊塞耳以通為度戒怒戒色一方用好磁石二塊銼如棗大頭略尖上搽麝少許塞兩耳口噙生鐵一時兩耳氣通透颯颯有聲勤用五七次即愈通明利氣湯方治虛火上升痰鬱熱或閉或鳴蒼朮鹽水炒白朮瓦焙香附童便炒生地薑汁浸檳榔各五分撫芎四分木二分半甘草二分貝母一錢半陳皮一錢二分梔子仁黃柏玄參各一錢黃連黃芩同用酒浸豬膽汁拌炙乾各七分竹瀝生薑煎食後服單方治耳鳴耳聾黃柏去皮八兩人乳拌勻曬乾再用鹽水炒褐色為末丸如梧子每服百丸空心鹽湯下治耳膿先以綿杖搌淨剪貓嗑毛燒灰存性摻入又方明礬發灰亦佳治耳內忽大痛或出血水或如蟲在內奔走及干痛難忍用蛻皮燒灰存性以鵝管吹入耳內餘論耳之重聽悉由於火治之必用涼藥年少人不得不治且能受涼劑年高人苟非疼痛便可以不治倘過用涼劑恐壞脾胃余見一醫用巴豆斑蝥麝香蔥汁為丸綿裹入耳雖似暫開旋又復重而人之痛苦白受若強用涼藥又豈止於痛苦已哉謹識治耳臭用干胭脂海螵蛸共為末吹入耳中愈又方用人發燒灰存性每日分許吹入耳愈治喉閉附方用荔枝草數莖加牛騰草或艾葉少許搗汁以人乳點之或口鼻內灌入立愈但不可多用用後煎夏枯草湯飲之治耳腎虛耳中作風水聲椒目巴豆菖蒲松脂各一錢共為末以紙薄卷作筒塞耳一日一換一方同以蠟為丸如棗核塞耳一方無松脂又方麝香五分全蠍十四個薄荷十四葉裹上二樣瓦上焙乾共